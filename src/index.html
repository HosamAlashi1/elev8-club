<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <title>EDKD</title>
  <base href="/" />

  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/x-icon" href="/assets/img/logo.svg" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4Bkz"
    crossorigin="anonymous"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  <link href="/assets/css/libs.bundle.css" rel="stylesheet" />
  <link href="/assets/css/theme.bundle.css" rel="stylesheet" />
  <link href="/assets/css/loading.css" rel="stylesheet" />
  <link href="/assets/css/toastr.css" rel="stylesheet" />
  <link href="/assets/css/custom.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

</head>

<body>
  <app-root>
    <div id="lottie-loader"
      style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; display: flex; justify-content: center; align-items: center; z-index: 9999;">
      <div id="lottie-animation" style="width: 50%; height: 50%;"></div>
    </div>
  </app-root>

  <script src="https://cdn.jsdelivr.net/npm/lottie-web/build/player/lottie.min.js"></script>
  <script>
    const lottieAnimation = document.getElementById('lottie-animation');
    const animation = lottie.loadAnimation({
      container: lottieAnimation,
      renderer: 'svg',
      loop: true,
      autoplay: true,
      path: '/assets/json/kidney-loader.json',
    });
  </script>
</body>

</html>
