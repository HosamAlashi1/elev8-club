<div class="bg-auth p-5 border rounded-4 shadow-sm">
  <h1 class="display-4 text-center mb-3">Sign in</h1>
  <p class="text-muted text-center mb-5">Please enter login information</p>

  <form [formGroup]="form" novalidate (ngSubmit)="submit()">
    <ngb-alert *ngIf="uiState().message" [type]="uiState().type" (closed)="showmessage(false, '')">
      {{ uiState().message }}
    </ngb-alert>

    <div class="form-group mb-3">
      <label class="form-label">E-mail :</label>
      <input
        type="email"
        class="form-control"
        formControlName="email"
        placeholder="Enter your email"
        [ngClass]="{
          'is-invalid': uiState().submitted && f['email'].invalid,
          'is-valid': uiState().submitted && f['email'].valid
        }"
      />
    </div>

    <div class="form-group mb-4">
      <label class="form-label">Password :</label>
      <input
        type="password"
        class="form-control"
        formControlName="password"
        placeholder="Enter your password"
        [ngClass]="{
          'is-invalid': uiState().submitted && f['password'].invalid,
          'is-valid': uiState().submitted && f['password'].valid
        }"
      />
    </div>

    <button
      type="submit"
      class="btn btn-lg w-100 btn-custom"
      [disabled]="(authService.isAuthLoading$ | async)"
    >
      <ng-container *ngIf="(authService.isAuthLoading$ | async); else notLoading">
        <span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
        <span>Signing in ...</span>
      </ng-container>
      <ng-template #notLoading>
        <span>Sign in</span>
      </ng-template>
    </button>
  </form>
</div>
