<div class="body d-flex align-items-center justify-content-center">
  
  <!--  عناصر متحركة متعلقة بالتداول -->
  <div class="floating-trading-elements">
    
    <!-- شموع يابانية متحركة -->
    <div class="candlestick candle-1"></div>
    <div class="candlestick candle-2"></div>
    <div class="candlestick candle-3"></div>
    <div class="candlestick candle-4"></div>
    
    <!-- رموز العملات عائمة -->
    <div class="floating-currency currency-1">$</div>
    <div class="floating-currency currency-2">€</div>
    <div class="floating-currency currency-3">¥</div>
    
    <!-- خطوط الرسم البياني -->
    <div class="chart-line line-1"></div>
    <div class="chart-line line-2"></div>
    <div class="chart-line line-3"></div>
    
    <!-- نجوم لامعة صغيرة -->
    <div class="twinkling-star star-small-1"></div>
    <div class="twinkling-star star-small-2"></div>
    <div class="twinkling-star star-small-3"></div>
    <div class="twinkling-star star-small-4"></div>
    <div class="twinkling-star star-small-5"></div>
    
    <!-- دوائر متموجة ناعمة -->
    <div class="soft-circle circle-soft-1"></div>
    <div class="soft-circle circle-soft-2"></div>
    <div class="soft-circle circle-soft-3"></div>
    
    <!-- أسهم الاتجاه -->
    <div class="trend-arrow arrow-up-1">↗</div>
    <div class="trend-arrow arrow-up-2">↗</div>
    <div class="trend-arrow arrow-down-1">↘</div>
    
    <!-- موجات السوق -->
    <div class="market-wave wave-1"></div>
    <div class="market-wave wave-2"></div>
    
  </div>

  <div class="container position-relative z-2">
    <div class="row">
      <div class="col-12 col-md-6 order-md-2 d-flex align-items-center justify-content-center">
        <div class="text-center mb-5 d-block d-md-none">
          <ng-lottie [options]="options" width="250px" height="250px"></ng-lottie>
        </div>
        <div class="text-center d-none d-md-block">
          <ng-lottie [options]="options" width="400px" height="400px"></ng-lottie>
        </div>
      </div>
      <div class="col-12 offset-md-1 col-md-5 order-md-1">
        <router-outlet></router-outlet>
      </div>
    </div>
  </div>
</div>
