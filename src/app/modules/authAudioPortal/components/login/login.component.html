<div class="login-container">
  <div class="mb-5">
    <h2 class="fw-bolder">Welcome back!</h2>
    <p class="text-muted">Please select your role and login to continue</p>
  </div>

  <!-- اختيار الدور -->
  <div class="role-selection d-flex justify-content-between mb-4">
    <button type="button" class="role-card" [class.active]="selectedRole === 2" (click)="setRole(2)">
      <i class="bi bi-pencil-fill"></i>
      <h3 class="fw-bold">Author</h3>
      <p>Create and manage your writing projects</p>
    </button>

    <button type="button" class="role-card" [class.active]="selectedRole === 3" (click)="setRole(3)">
      <i class="bi bi-journal-text"></i>
      <h3 class="fw-bold">Editor</h3>
      <p>Review and edit assigned manuscripts</p>
    </button>

    <button type="button" class="role-card" [class.active]="selectedRole === 4" (click)="setRole(4)">
      <i class="bi bi-person-lines-fill"></i>
      <h3 class="fw-bold">Customer</h3>
      <p>Create and manage your books</p>
    </button>
  </div>

  <!-- فورم تسجيل الدخول -->
  <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
    <ngb-alert *ngIf="uiState().message" [type]="uiState().type" (closed)="showmessage(false, '')">
      {{ uiState().message }}
    </ngb-alert>

    <div class="mb-4">
      <label class="form-label fw-bold">Email address</label>
      <input
        type="email"
        formControlName="email"
        class="form-control"
        placeholder="Enter your email"
      />
    </div>

    <div class="mb-4 position-relative">
      <label class="form-label fw-bold">Password</label>
      <input
        [type]="showPassword ? 'text' : 'password'"
        formControlName="password"
        class="form-control"
        placeholder="Enter your password"
      />
      <i
        class="bi"
        [ngClass]="showPassword ? 'bi-eye-slash' : 'bi-eye'"
        (click)="togglePassword()"
      ></i>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-4">
      <div>
        <input 
          class="form-check-input" 
          type="checkbox" 
          id="remember" 
          [checked]="rememberMe" 
          (change)="toggleRemember($event)" 
        />
        <label for="remember" class="ms-1 mt-1 small text-muted cursor-pointer">
          Remember me
        </label>
      </div>
      <a href="#" class="small text-primary text-decoration-none">Forgot password?</a>
    </div>

    <!-- زر الدخول مع اللودر -->
    <button type="submit" class="btn btn-custom w-100" [disabled]="isLoading">
      <ng-container *ngIf="isLoading; else notLoading">
        <span class="spinner-border spinner-border-sm me-2"></span>
        Signing in...
      </ng-container>
      <ng-template #notLoading>Login</ng-template>
    </button>
  </form>
</div>
