<div class="searchable-select" [class.disabled]="disabled" [class.loading]="loading">
  <!-- Main select button -->
<!-- [class.invalid]="!isValid" -->
  <div #selectButton
       class="select-button" 
       [class.open]="isOpen"
       [class.has-value]="selectedOption"
       [ngStyle]="dynamicButtonStyles"
       (click)="toggleDropdown()">
    
    <!-- Display area -->
    <div class="select-display">
      <span *ngIf="selectedOption" class="selected-text">
        {{ displayText }}
      </span>
      <span *ngIf="!selectedOption" class="placeholder-text">
        {{ loading ? 'Loading...' : placeholder }}
      </span>
    </div>

    <!-- Actions -->
    <div class="select-actions">
      <button *ngIf="clearable && selectedOption && !disabled" 
              type="button"
              class="clear-btn"
              (click)="clearSelection(); $event.stopPropagation()"
              aria-label="Clear selection">
        <i class="fe fe-x"></i>
      </button>
      
      <div class="dropdown-icon" [class.rotate]="isOpen">
        <i class="fe fe-chevron-down"></i>
      </div>
    </div>
  </div>
</div>

<!-- Dropdown Template (will be rendered in body) -->
<ng-template #dropdownTemplate>
  <div class="dropdown-menu-portal" 
       [class.show]="isOpen"
       [ngStyle]="dropdownStyles"
       (click)="$event.stopPropagation()">
    
    <!-- Search input -->
    <div class="search-container">
      <input #searchInput
             type="text"
             class="search-input"
             [ngStyle]="dynamicInputStyles"
             placeholder="Search for items..."
             (input)="onSearchInput($event)"
             (keydown)="onSearchKeydown($event)"
             [value]="currentSearchQuery">
      <i class="fe fe-search search-icon"></i>
    </div>

    <!-- Loading state -->
    <div *ngIf="loading" class="loading-state">
      <div class="spinner-border spinner-border-sm me-2"></div>
      <span>Loading data...</span>
    </div>

    <!-- Options list -->
    <div class="options-container" *ngIf="!loading && hasResults">
      <div *ngFor="let option of filteredOptions; let i = index; trackBy: trackByFn"
           class="option-item"
           [class.highlighted]="i === highlightedIndex"
           [class.selected]="selectedOption && selectedOption[valueField] === option[valueField]"
           [class.disabled]="option.disabled"
           [attr.data-index]="i"
           (click)="selectOption(option)">
        
        <span class="option-text">
          <!-- <span *ngIf="option.flag" class="option-flag">{{ option.flag }}</span> -->
          {{ option[displayField] || option.name }}
        </span>
        
        <i *ngIf="selectedOption && selectedOption[valueField] === option[valueField]" 
           class="fe fe-check option-check"></i>
      </div>
    </div>

    <!-- Show placeholder when no search query and no initial data -->
    <div *ngIf="!loading && !searchQuery && !hasResults" class="no-results">
      <i class="fe fe-users"></i>
      <span>Recent items will appear here...</span>
    </div>

    <!-- No results -->
    <div *ngIf="!loading && !hasResults && searchQuery" class="no-results">
      <i class="fe fe-search"></i>
      <span>No results found for "{{ searchQuery }}"</span>
    </div>
  </div>
</ng-template>
