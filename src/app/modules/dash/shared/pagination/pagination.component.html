<ul class="pagination m-3" *ngIf="!(isLoading$ | async) && totalRecords > size">
  <!-- Prev -->
  <li class="page-item">
    <button type="button" class="page-link" [disabled]="disabled || isFirstPage()" (click)="goToPage(currentPage - 1)">
      <i class="fe fe-chevrons-left"></i>
    </button>
  </li>

  <!-- First + ... -->
  <li class="page-item" *ngIf="pages[0] > 1">
    <button class="page-link" (click)="goToPage(1)">1</button>
    <!-- <button class="page-link dots" disabled>…</button> -->
  </li>

  <!-- Dynamic Pages -->
  <li class="page-item" *ngFor="let page of pages">
    <button type="button" class="page-link"
      [ngClass]="{'text-bg-primary': currentPage === page}"
      [disabled]="disabled || currentPage === page"
      (click)="goToPage(page)">
      {{ page }}
    </button>
  </li>

  <!-- ... + Last -->
  <li class="page-item" *ngIf="pages[pages.length - 1] < totalPages">
    <!-- <button class="page-link dots" disabled>…</button> -->
    <button class="page-link" [disabled]="disabled" (click)="goToPage(totalPages)">
      {{ totalPages }}
    </button>
  </li>

  <!-- Next -->
  <li class="page-item">
    <button type="button" class="page-link" [disabled]="disabled || isLastPage()" (click)="goToPage(currentPage + 1)">
      <i class="fe fe-chevrons-right"></i>
    </button>
  </li>
</ul>
