<div class="header">
    <div class="container-fluid">
        <div class="header-body">
            <div class="row align-items-center justify-content-between">
                <div class="col">
                    <h2 class="header-title">
                        <lucide-icon [name]="'user-check'"></lucide-icon>
                        Admins <small>({{ totalCount }})</small>
                    </h2>
                </div>
                <div class="col-auto">
                    <button class="btn btn-sm btn-custom rounded-pill px-3" (click)="add()">
                        <i class="fe fe-plus me-2"></i>
                        <span>Add Admin</span>
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="container-fluid">
    <div class="card">
        <div class="card-header d-flex justify-content-between align-items-center">
             <div
                class="d-flex align-items-center input-group-merge input-group-flush input-group position-relative w-50">
                <i class="fe fe-search text-muted position-absolute mb-1 me-3"></i>
                <input [(ngModel)]="searchText" class="form-control m-0 ps-4" placeholder="Type to search..."
                    (ngModelChange)="onSearchChange()" />
            </div>

            <div class="d-flex align-items-center gap-3">
                <app-modern-select 
                    [options]="statusOptions"
                    [(ngModel)]="statusFilter"
                    (selectionChange)="onFilterChange()"
                    placeholder="All Statuses"
                    [icon]="'fe fe-filter'"
                    [clearable]="true"
                    size="sm"
                    minWidth="160px">
                </app-modern-select>

                <button class="btn btn-sm btn-danger d-flex align-items-center gap-2" (click)="reset()">
                    <i class="fe fe-rotate-ccw"></i>
                    <span>Reset</span>
                </button>
            </div>

        </div>

        <div class="table-responsive">
            <table class="table table-sm table-nowrap card-table table-hover">
                <thead>
                    <tr>
                          <th class="w-5">#NO</th>
                        <th class="w-10">Image</th>
                        <th class="w-15">Name</th>
                        <th class="w-15">Username</th>
                        <th class="w-15">Email</th>
                        <th class="w-20">Roles</th>
                        <th class="w-10">Status</th>
                        <th class="w-5">Actions</th>
                    </tr>
                </thead>

                <!-- Loading skeletons -->
                <tbody *ngIf="isLoading$ | async">
                    <tr *ngFor="let number of [].constructor(size + 1)">
                        <td *ngFor="let i of [].constructor(8)">
                            <ngx-skeleton-loader appearance="line" animation="progress-dark"
                                [theme]="{ width: '50%', height: '33px', 'border-radius': '3px', margin: '0' }">
                            </ngx-skeleton-loader>
                        </td>
                    </tr>
                </tbody>

                <tbody *ngIf="!(isLoading$ | async)">
                    <tr *ngFor="let user of users; let i = index">
                        <td>#{{ i + 1 }}</td>
                        <td>
                            <img [src]="user.image && user.image.trim() !== '' ? user.image : 'assets/img/blank.png'"
                                alt="profile image" class="avatar-img avatar rounded-circle cursor-pointer"
                                (click)="openImageModal(user.image && user.image.trim() !== '' ? user.image : 'assets/img/blank.png')" />
                        </td>
                        <td>{{ user.name }}</td>
                        <td>{{ user.username }}</td>
                        <td>{{ user.email }}</td>
                        <td>
                            <span class="badge bg-custom me-1" *ngFor="let role of user.roles">
                                {{ role.name }}
                            </span>
                            <span *ngIf="!user.roles || user.roles.length === 0" class="text-muted">No roles</span>
                        </td>
                        <td>
                            <div class="form-check form-switch custom-switch-pink">
                                <input type="checkbox" class="form-check-input" [checked]="user.status === 'Active'"
                                    (change)="toggleStatus(user)" 
                                    [disabled]="user.account_type === 'super_admin'" />
                            </div>
                        </td>
                        <td>
                            <div class="btn-group dropstart">
                                <span data-bs-toggle="dropdown" aria-expanded="false">
                                    <i class="fe fe-more-vertical black-menu fs-2"></i>
                                </span>
                                <ul class="dropdown-menu">
                                    <li>
                                        <a class="dropdown-item" (click)="edit(user)">
                                            <i class="fe fe-edit me-2"></i>Edit
                                        </a>
                                    </li>
                                    <li *ngIf="user.account_type !== 'super_admin'">
                                        <hr class="m-2">
                                    </li>
                                    <li *ngIf="user.account_type !== 'super_admin'">
                                        <a class="dropdown-item" (click)="delete(user)">
                                            <i class="fe fe-trash-2 text-danger me-2"></i>
                                            <span class="text-danger">Delete</span>
                                        </a>
                                    </li>
                                </ul>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <app-no-results [isLoading$]="isLoading$" [totalRecords]="totalCount"></app-no-results>
        <app-pagination [isLoading$]="isLoading$" [totalRecords]="totalCount" [size]="size" (pageChange)="list($event)">
        </app-pagination>
    </div>
</div>
