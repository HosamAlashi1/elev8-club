<form [formGroup]="form" (ngSubmit)="submit()" novalidate>
  <div class="modal-header">
    <h4 class="modal-title">{{ tutorial ? 'Edit' : 'Add New' }} Tutorial</h4>
    <button type="button" class="btn-close" (click)="activeModal.dismiss()"></button>
  </div>

  <div class="modal-body">
    <div class="row">
      <!-- Title -->
      <div class="col-md-6">
        <label class="form-label">Title <span class="text-danger">*</span></label>
        <input class="form-control" formControlName="title" placeholder="Enter title"
          [ngClass]="{ 'is-invalid': submitted && f['title'].invalid, 'is-valid': submitted && f['title'].valid }" />
        <div *ngIf="submitted && f['title'].invalid" class="invalid-feedback">
          Title is required.
        </div>
      </div>

      <!-- Step -->
      <div class="col-md-6">
        <label class="form-label">Step <span class="text-danger">*</span></label>
        <input type="number" class="form-control" formControlName="step" placeholder="Enter step number" min="1"
          [ngClass]="{ 'is-invalid': submitted && f['step'].invalid, 'is-valid': submitted && f['step'].valid }" />
        <div *ngIf="submitted && f['step'].invalid" class="invalid-feedback">
          <div *ngIf="f['step'].errors?.['required']">Step is required.</div>
          <div *ngIf="f['step'].errors?.['min']">Step must be at least 1.</div>
        </div>
      </div>

      <!-- Description -->
      <div class="col-md-12 mt-3">
        <label class="form-label">Description <span class="text-danger">*</span></label>
        <textarea class="form-control" formControlName="description" placeholder="Enter description" rows="4"
          [ngClass]="{ 'is-invalid': submitted && f['description'].invalid, 'is-valid': submitted && f['description'].valid }"></textarea>
        <div *ngIf="submitted && f['description'].invalid" class="invalid-feedback">
          Description is required.
        </div>
      </div>

      <!-- Image -->
      <div class="col-md-6 mt-3">
        <label class="form-label">Upload Image</label>
        <input type="file" class="form-control" (change)="onImageChange($event)" accept="image/*">
        <small class="text-muted">Optional image for the tutorial step</small>
      </div>

      <!-- Video -->
      <div class="col-md-6 mt-3">
        <label class="form-label">Upload Video</label>
        <input type="file" class="form-control" (change)="onVideoChange($event)" accept="video/*">
        <small class="text-muted">Optional video for the tutorial step</small>
      </div>

    </div>
  </div>

  <div class="modal-footer">
    <button type="button" class="btn btn-sm btn-light" (click)="activeModal.dismiss()">
      <i class="fe fe-x me-2"></i>Close
    </button>

    <button type="submit" class="btn btn-sm btn-custom" [disabled]="(httpService.getLoading('addEditTutorial') | async)">
      <ng-container *ngIf="(httpService.getLoading('addEditTutorial') | async)">
        <span class="spinner-border spinner-border-sm me-2"></span> Saving...
      </ng-container>
      <ng-container *ngIf="!(httpService.getLoading('addEditTutorial') | async)">
        <i class="fe fe-check me-2"></i> Save
      </ng-container>
    </button>
  </div>
</form>
