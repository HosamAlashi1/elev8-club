<!-- pie-chart.component.html -->
<div class="chart-wrap">
  <div class="mini-title">Sales by Payment Method</div>

  <apx-chart
    [series]="opts.series"
    [labels]="opts.labels"
    [chart]="opts.chart"
    [plotOptions]="opts.plotOptions"
    [dataLabels]="opts.dataLabels"
    [stroke]="opts.stroke"
    [fill]="opts.fill"
    [colors]="opts.colors"
    [legend]="opts.legend"
    [tooltip]="opts.tooltip"
    [responsive]="opts.responsive">
  </apx-chart>
</div>
