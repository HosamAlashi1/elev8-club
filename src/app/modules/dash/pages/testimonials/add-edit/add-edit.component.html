<form [formGroup]="form" (ngSubmit)="submit()" novalidate>
  <div class="modal-header">
    <h4 class="modal-title">{{ testimonial ? 'Edit' : 'Add New' }} Testimonial</h4>
    <button type="button" class="btn-close" (click)="activeModal.dismiss()"></button>
  </div>

  <div class="modal-body">
    <div class="row">
      <!-- Image -->
      <div class="col-12 mb-3">
        <label class="form-label">Client Image <span class="text-danger" *ngIf="!testimonial">*</span></label>
        <input type="file" class="form-control" (change)="onFileChange($event)" accept="image/*"
          [ngClass]="{ 'is-invalid': submitted && f['image'].invalid, 'is-valid': submitted && f['image'].valid }" />
        <div *ngIf="submitted && f['image'].invalid" class="invalid-feedback">
          Client image is required.
        </div>
        <small class="text-muted" *ngIf="testimonial">Leave empty to keep current image</small>
        
        <!-- Image Preview -->
        <div *ngIf="imagePreview" class="mt-3">
          <img [src]="imagePreview" alt="Preview" class="img-thumbnail" style="max-width: 150px; max-height: 150px;">
        </div>
      </div>

      <!-- Name -->
      <div class="col-md-6">
        <label class="form-label">Client Name <span class="text-danger">*</span></label>
        <input class="form-control" formControlName="name" placeholder="Enter client name"
          [ngClass]="{ 'is-invalid': submitted && f['name'].invalid, 'is-valid': submitted && f['name'].valid }" />
        <div *ngIf="submitted && f['name'].invalid" class="invalid-feedback">
          Client name is required.
        </div>
      </div>

      <!-- Position -->
      <div class="col-md-6">
        <label class="form-label">Position <span class="text-danger">*</span></label>
        <input class="form-control" formControlName="position" placeholder="Enter position/title"
          [ngClass]="{ 'is-invalid': submitted && f['position'].invalid, 'is-valid': submitted && f['position'].valid }" />
        <div *ngIf="submitted && f['position'].invalid" class="invalid-feedback">
          Position is required.
        </div>
      </div>

      <!-- Rating -->
      <div class="col-12 mt-3">
        <label class="form-label">Rating <span class="text-danger">*</span></label>
        <div class="rating-input-wrapper">
          <select class="form-select" formControlName="rating"
            [ngClass]="{ 'is-invalid': submitted && f['rating'].invalid, 'is-valid': submitted && f['rating'].valid }">
            <option value="">Select Rating</option>
            <option *ngFor="let rating of ratings" [value]="rating">
              {{ rating }} Stars
            </option>
          </select>
          <div class="rating-preview mt-2" *ngIf="form.get('rating')?.value">
            <span *ngFor="let star of getStarArray(form.get('rating')?.value)" class="text-warning me-1">
              <i class="fas fa-star"></i>
            </span>
          </div>
        </div>
        <div *ngIf="submitted && f['rating'].invalid" class="invalid-feedback">
          Rating is required.
        </div>
      </div>

      <!-- Testimonial -->
      <div class="col-12 mt-3">
        <label class="form-label">Testimonial <span class="text-danger">*</span></label>
        <textarea class="form-control" rows="5" formControlName="testimonial" placeholder="Enter client testimonial"
          [ngClass]="{ 'is-invalid': submitted && f['testimonial'].invalid, 'is-valid': submitted && f['testimonial'].valid }"></textarea>
        <div *ngIf="submitted && f['testimonial'].invalid" class="invalid-feedback">
          Testimonial is required.
        </div>
      </div>
    </div>
  </div>

  <div class="modal-footer">
    <button type="button" class="btn btn-secondary" (click)="activeModal.dismiss()">Cancel</button>
    <button type="submit" class="btn btn-primary">
      {{ testimonial ? 'Update' : 'Create' }} Testimonial
    </button>
  </div>
</form>
