<form class="store-info-form" [formGroup]="form" (ngSubmit)="onSubmit()">
    <div class="row g-4">
        <!-- LEFT -->
        <div class="col-md-6">
            <!-- Store Name -->
            <label class="form-label">Store Name</label>
            <input type="text" class="form-control soft-input" formControlName="storeName" placeholder="BookStore" />

            <!-- Logo -->
            <label class="form-label mt-4">Logo</label>

            <div class="logo-dropzone" [class.dragover]="dragOver" (dragover)="onDragOver($event)"
                (dragleave)="onDragLeave($event)" (drop)="onDrop($event)" (click)="fileInput.click()">

                <!-- يغطي الصندوق للنقر (لا يعيق الأزرار) -->
                <input #fileInput type="file" class="file-input-overlay" accept="image/*"
                    (change)="onFileSelected($event)" />

                <!-- المعاينة -->
                <ng-container *ngIf="logoPreview; else placeholder">
                    <div class="preview-wrap">
                        <img [src]="logoPreview" alt="Logo preview" class="img-preview" />
                        <div class="text-muted small file-name">{{ logoFile?.name }} ({{ logoSize }})</div>
                        <button type="button" class="btn btn-sm btn-outline-secondary remove-btn"
                            (click)="clearLogo(); $event.stopPropagation()">
                            Remove
                        </button>
                    </div>
                </ng-container>

                <!-- الحالة الافتراضية -->
                <ng-template #placeholder>
                    <i class="fe fe-upload upload-ic"></i>
                    <div class="drop-hint pb-1">Drag and drop or click to upload</div>
                </ng-template>
            </div>



            <!-- Address -->
            <label class="form-label mt-4">Address</label>
            <textarea rows="4" class="form-control soft-input" formControlName="address"
                placeholder="123 Book Street, Reading, UK"></textarea>
        </div>

        <!-- RIGHT -->
        <div class="col-md-6">
            <!-- Contact Email -->
            <label class="form-label">Contact Email</label>
            <input type="email" class="form-control soft-input" formControlName="email"
                placeholder="contact@bookstore.com" />

            <!-- Phone -->
            <label class="form-label mt-4">Phone Number</label>
            <input type="tel" class="form-control soft-input" formControlName="phone" placeholder="+44 123 456 7890" />

            <!-- Business Hours -->
            <label class="form-label mt-4">Business Hours</label>
            <div class="d-flex gap-3">
                <input type="time" class="form-control soft-input" formControlName="openTime" />
                <input type="time" class="form-control soft-input" formControlName="closeTime" />
            </div>
        </div>
    </div>

    <!-- Actions -->
    <div class="d-flex justify-content-end gap-3 mt-4">
        <button type="button" class="btn btn-light border" (click)="onCancel()">Cancel</button>
        <button type="submit" class="btn btn-custom">Save Changes</button>
    </div>
</form>
