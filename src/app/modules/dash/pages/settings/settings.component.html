<div class="settings-container" data-aos="fade-up">
  <h2 class="settings-title" data-aos="fade-right" data-aos-delay="100">Settings</h2>

  <div class="card rounded-2 mt-4" data-aos="zoom-in" data-aos-delay="200">
    <!-- Tabs -->
    <div class="tabs d-flex position-relative">
      <button
        #tabBtn
        class="tab-btn"
        [class.active]="activeTab === 'store-info'"
        (click)="setTab('store-info')"
        data-aos="fade-up" data-aos-delay="300">
        Store Info
      </button>

      <button
        #tabBtn
        class="tab-btn"
        [class.active]="activeTab === 'payments'"
        (click)="setTab('payments')"
        data-aos="fade-up" data-aos-delay="350">
        Payments
      </button>

      <button
        #tabBtn
        class="tab-btn"
        [class.active]="activeTab === 'shipping'"
        (click)="setTab('shipping')"
        data-aos="fade-up" data-aos-delay="400">
        Shipping
      </button>

      <button
        #tabBtn
        class="tab-btn"
        [class.active]="activeTab === 'taxes'"
        (click)="setTab('taxes')"
        data-aos="fade-up" data-aos-delay="450">
        Taxes
      </button>

      <button
        #tabBtn
        class="tab-btn"
        [class.active]="activeTab === 'constants'"
        (click)="setTab('constants')"
        data-aos="fade-up" data-aos-delay="500">
        Constants
      </button>

      <button
        #tabBtn
        class="tab-btn"
        [class.active]="activeTab === 'roles-permissions'"
        (click)="setTab('roles-permissions')"
        data-aos="fade-up" data-aos-delay="550">
        Roles & permissions
      </button>

      <!-- Underline المتحرك -->
      <div
        class="tab-underline-dynamic"
        [ngStyle]="{ left: underlineLeft + 'px', width: underlineWidth + 'px' }">
      </div>
    </div>

    <!-- Tab content -->
    <div class="tab-content p-4" [@tabSlide]="activeTab" data-aos="fade-in" data-aos-delay="600">
      <ng-container *ngIf="activeTab === 'store-info'">
        <app-store-info></app-store-info>
      </ng-container>

      <ng-container *ngIf="activeTab === 'payments'">
        <app-payments></app-payments>
      </ng-container>

      <ng-container *ngIf="activeTab === 'shipping'">
        <app-shipping></app-shipping>
      </ng-container>

      <ng-container *ngIf="activeTab === 'taxes'">
        <app-taxes></app-taxes>
      </ng-container>

      <ng-container *ngIf="activeTab === 'constants'">
        <app-constants></app-constants>
      </ng-container>

      <ng-container *ngIf="activeTab === 'roles-permissions'">
        <app-roles-permissions></app-roles-permissions>
      </ng-container>
    </div>
  </div>
</div>
