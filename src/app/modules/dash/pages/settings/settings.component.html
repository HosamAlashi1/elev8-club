<div class="settings-container">
  <h2 class="settings-title">Settings</h2>

  <div class="card rounded-2 mt-4">
    <!-- Tabs -->
    <div class="tabs d-flex position-relative">
      <button
        #tabBtn
        class="tab-btn"
        [class.active]="activeTab === 'store-info'"
        (click)="setTab('store-info')">Store Info</button>

      <button
        #tabBtn
        class="tab-btn"
        [class.active]="activeTab === 'payments'"
        (click)="setTab('payments')">Payments</button>

      <button
        #tabBtn
        class="tab-btn"
        [class.active]="activeTab === 'shipping'"
        (click)="setTab('shipping')">Shipping</button>

      <button
        #tabBtn
        class="tab-btn"
        [class.active]="activeTab === 'taxes'"
        (click)="setTab('taxes')">Taxes</button>

      <button
        #tabBtn
        class="tab-btn"
        [class.active]="activeTab === 'constants'"
        (click)="setTab('constants')">Constants</button>

      <button
        #tabBtn
        class="tab-btn"
        [class.active]="activeTab === 'users-roles'"
        (click)="setTab('users-roles')">Users & Roles</button>

      <!-- Underline المتحرك -->
      <div
        class="tab-underline-dynamic"
        [ngStyle]="{ left: underlineLeft + 'px', width: underlineWidth + 'px' }">
      </div>
    </div>

    <!-- Tab content -->
    <div class="tab-content p-4" [@tabSlide]="activeTab">
      <ng-container *ngIf="activeTab === 'store-info'">
        <app-store-info></app-store-info>
      </ng-container>

      <ng-container *ngIf="activeTab === 'payments'">
        <app-payments></app-payments>
      </ng-container>

      <ng-container *ngIf="activeTab === 'shipping'">
        <app-shipping></app-shipping>
      </ng-container>

      <ng-container *ngIf="activeTab === 'taxes'">
        <app-taxes></app-taxes>
      </ng-container>

      <ng-container *ngIf="activeTab === 'constants'">
        <app-constants></app-constants>
      </ng-container>

      <ng-container *ngIf="activeTab === 'users-roles'">
        <app-users-roles></app-users-roles>
      </ng-container>
    </div>
  </div>
</div>
