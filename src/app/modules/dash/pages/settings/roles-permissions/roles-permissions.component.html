<!-- Header -->
<div class="card-header d-flex justify-content-between align-items-center flex-wrap gap-4 border-0 my-3">
  <!-- Left side (search, size) -->
  <div class="d-flex align-items-center gap-3 flex-wrap flex-grow-1 d-none d-md-flex">
    <!-- Search -->
    <div class="search-wrap position-relative flex-grow-1" style="max-width: 260px;">
      <i class="fe fe-search text-muted position-absolute"></i>
      <input [(ngModel)]="searchText" class="form-control ps-5" placeholder="Search by role name..."
             (ngModelChange)="onSearchChange()" />
    </div>

    <!-- Size Filter -->
    <app-modern-select [(ngModel)]="size" [options]="sizeOptions" placeholder2="Rows" size="sm"
      (selectionChange)="onSizeChange()" [minWidth]="'120px'" [icon]="'fe fe-grid'" [customWidth]="'130px'"
      [backgroundColor]="'#f8f9fa'" [textColor]="'#495057'">
    </app-modern-select>
  </div>

  <!-- Right side (Add + Reset buttons) -->
  <div class="d-flex align-items-center gap-2">
    <button class="btn btn-danger d-flex align-items-center gap-2" (click)="reset()">
      <i class="fe fe-refresh-ccw"></i>
      Reset
    </button>

    <button class="btn btn-custom d-flex align-items-center gap-2" *ngIf="publicService.hasPermission('MANAGE_ROLES')" (click)="add()">
      <i class="fe fe-plus"></i>
      Add Role
    </button>
  </div>
</div>

<div class="content mx-4">
  <!-- Table -->
  <div class="card mb-0">
    <div class="table-responsive mb-2">
      <table class="table table-sm table-nowrap card-table table-hover mb-0">
        <thead>
          <tr>
            <th class="w-40">Role Name</th>
            <th class="w-50">Created Date</th>
            <th class="w-10">Actions</th>
          </tr>
        </thead>

         <!-- Skeletons -->
                <tbody *ngIf="(isLoading$ | async)">
                    <tr *ngFor="let _ of [].constructor(size)">
                        <td *ngFor="let __ of [].constructor(3)" style="padding:16px 10px;">
                            <ngx-skeleton-loader appearance="line" animation="progress-dark" [theme]="{
                    width: '60%',
                    height: '16px',
                    'border-radius': '6px',
                    margin: '0'
                  }"></ngx-skeleton-loader>
                        </td>
                    </tr>
                </tbody>

        <!-- Data -->
        <tbody *ngIf="!(isLoading$ | async)">
          <tr *ngFor="let r of roles">
            <td class="fw-semibold text-dark">{{ r.name }}</td>
            <td class="text-muted">
              {{ r.insert_date | date:'medium' }}
            </td>
            <td>
              <div class="btn-group dropstart">
                <span data-bs-toggle="dropdown" role="button">
                  <i class="fe fe-more-vertical black-menu fs-3"></i>
                </span>
                <ul class="dropdown-menu">
                  <li *ngIf="publicService.hasPermission('MANAGE_ROLES')">
                    <a class="dropdown-item" (click)="edit(r)">
                      <i class="fe fe-edit me-2"></i>Edit
                    </a>
                  </li>
                  <li>
                    <hr class="m-2" />
                  </li>
                  <li *ngIf="publicService.hasPermission('MANAGE_ROLES')">
                    <a class="dropdown-item" (click)="delete(r)">
                      <i class="fe fe-trash-2 text-danger me-2"></i>
                      <span class="text-danger">Delete</span>
                    </a>
                  </li>
                </ul>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- No Results Component -->
    <app-no-results [isLoading$]="isLoading$" [totalRecords]="totalCount"></app-no-results>
  </div>

  <!-- Footer -->
  <div class="card-footer border-0 d-flex justify-content-between align-items-center flex-wrap gap-2">
    <small class="text-muted">
      Showing {{ roles.length ? (page - 1) * size + 1 : 0 }} -
      {{ (page - 1) * size + roles.length }} of {{ totalCount }} roles
    </small>

    <app-pagination [isLoading$]="isLoading$" [totalRecords]="totalCount" [size]="size" (pageChange)="list($event)">
    </app-pagination>
  </div>
</div>
