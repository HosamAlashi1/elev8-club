<div class="container-fluid p-2">
    <div class="row">
        <!-- Left: Profile Card -->
        <div class="col-12 col-md-12 col-xl-4 mb-2">
            <div class="card left-card text-center shadow-sm p-4">
                <div class="position-relative mb-3">
                    <img [src]="user.image ?? 'assets/img/avatar2.png'" alt="Avatar" class="rounded-circle"
                        width="120" height="120" />
                    <label class="btn btn-sm btn-custom position-absolute" style="bottom: 0; right: 0;"
                        title="Change Photo">
                        <i class="fe fe-camera"></i>
                        <input type="file" accept="image/*" (change)="onImageChange($event)" hidden />
                    </label>
                </div>
                <h4 class="fw-bold mb-1">{{ user.name }}</h4>
                <p class="text-muted">{{ user.email }}</p>
                <span class="py-2 w-50 m-auto badge bg-custom">
                    <i class="fe fe-shield me-1"></i>{{ user.account_type }}
                </span>
            </div>
        </div>

        <!-- Right: Profile Info -->
        <div class="col-12 col-md-12 col-xl-8">
            <div class="card p-4 shadow-sm">
                <h5 class="fw-bold mb-4">Account Information</h5>

                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label">Full Name</label>
                        <input type="text" class="form-control" [(ngModel)]="user.name" />
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" [(ngModel)]="user.email" />
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col-12">
                        <label class="form-label">Phone Number</label>
                        <input type="text" class="form-control" name="phone" [(ngModel)]="user.phone"
                            #phoneRef="ngModel" pattern="^(\+?\d{7,15})$" minlength="7" maxlength="15" required />

                        <div *ngIf="phoneRef.invalid && phoneRef.touched" class="text-danger mt-1 small">
                            <div *ngIf="phoneRef.errors?.['pattern']">Only numbers allowed (with optional + prefix).
                            </div>
                            <div *ngIf="phoneRef.errors?.['minlength']">Minimum 7 digits.</div>
                            <div *ngIf="phoneRef.errors?.['maxlength']">Maximum 15 digits allowed.</div>
                        </div>
                    </div>
                </div>

                <!-- Password (if editing) -->
                <div class="row mb-3" *ngIf="isEditing">
                    <div class="col-12">
                        <label class="form-label">New Password</label>
                        <input type="password" class="form-control" [(ngModel)]="newPassword" />
                    </div>
                </div>

                <div class="d-flex justify-content-between mt-4">
                    <button type="button" class="btn btn-sm btn-custom"
                        [disabled]="httpService.getLoading('editProfile') | async" (click)="saveChanges()">
                        <ng-container *ngIf="httpService.getLoading('editProfile') | async">
                            <span class="spinner-border spinner-border-sm me-2"></span> {{ isEditing ? 'Saving...' :
                            'Editing...' }}
                        </ng-container>
                        <ng-container *ngIf="!(httpService.getLoading('editProfile') | async)">
                            <i class="fe fe-{{ isEditing ? 'check' : 'edit' }} me-1"></i> {{ isEditing ? 'Save' :
                            'Edit' }}
                        </ng-container>
                    </button>

                    <button class="btn btn-sm btn-outline-secondary" (click)="changePassword()"
                        [disabled]="isEditing">
                        <i class="fe fe-lock me-1"></i>Change Password
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
