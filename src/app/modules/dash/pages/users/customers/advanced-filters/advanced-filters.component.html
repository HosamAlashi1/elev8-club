<div class="modal-header">
    <h5 class="modal-title">Advanced Filters</h5>
    <button type="button" class="btn-close" (click)="close()" aria-label="Close"></button>
</div>

<div class="modal-body">
    <div class="row g-3">
        <!-- Min Orders -->
        <div class="col-md-6">
            <label class="form-label">Min Orders</label>
            <input type="number" class="form-control" [(ngModel)]="minOrders" />
        </div>

        <!-- Min Spend -->
        <div class="col-md-6">
            <label class="form-label">Min Spend ($)</label>
            <input type="number" class="form-control" [(ngModel)]="minSpend" />
        </div>

        <!-- Last Order After -->
        <div class="col-md-6">
            <label class="form-label">Last Order After</label>
            <!-- Custom Date Picker -->
            <div class="position-relative">
                <div class="custom-date-input position-relative">
                    <input type="text" class="form-control custom-date-field" [(ngModel)]="lastOrderDateFormatted"
                        (click)="toggleLastOrderDatePicker()" placeholder="Select Date" readonly>
                    <i class="fe fe-calendar position-absolute"
                        style="right: 12px; top: 50%; transform: translateY(-50%); color: #6c757d; pointer-events: none;"></i>
                </div>

                <!-- Date Picker Dropdown -->
                <div class="card position-absolute shadow-lg border-0"
                    style="top: 100%; left: 0; z-index: 1060; min-width: 320px; margin-top: 4px;"
                    *ngIf="showLastOrderDatePicker">
                    <div class="card-body p-3">

                        <!-- Quick Date Selection -->
                        <div class="quick-dates mb-3">
                            <button class="quick-date-btn" (click)="setLastOrderQuickDate('today')">Today</button>
                            <button class="quick-date-btn" (click)="setLastOrderQuickDate('week')">1 Week
                                Ago</button>
                            <button class="quick-date-btn" (click)="setLastOrderQuickDate('month')">1 Month
                                Ago</button>
                            <button class="quick-date-btn" (click)="setLastOrderQuickDate('3months')">3
                                Months Ago</button>
                        </div>

                        <!-- Mini Calendar -->
                        <div class="mini-calendar mb-3">
                            <div class="calendar-header d-flex justify-content-between align-items-center mb-3">
                                <button type="button" class="btn btn-sm btn-outline-light"
                                    (click)="previousLastOrderMonth()">
                                    <i class="fe fe-chevron-left"></i>
                                </button>
                                <h6 class="mb-0 fw-semibold">{{ getLastOrderMonthYear() }}</h6>
                                <button type="button" class="btn btn-sm btn-outline-light"
                                    (click)="nextLastOrderMonth()">
                                    <i class="fe fe-chevron-right"></i>
                                </button>
                            </div>
                            <div class="calendar-grid">
                                <div class="calendar-days-header">
                                    <div class="day-header" *ngFor="let day of dayHeaders">{{ day }}</div>
                                </div>
                                <div class="calendar-days">
                                    <div class="day-cell" *ngFor="let day of lastOrderCalendarDays"
                                        [class.other-month]="!day.currentMonth" [class.selected]="day.selected"
                                        [class.today]="day.isToday" (click)="selectLastOrderDate(day)">
                                        {{ day.date }}
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="button" class="btn btn-custom btn-sm flex-fill" (click)="applyLastOrderDate()"
                                [disabled]="!minLastOrder">
                                Apply
                            </button>
                            <button type="button" class="btn btn-outline-secondary btn-sm"
                                (click)="clearLastOrderDate()">
                                Clear
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Status Filter -->
        <div class="col-md-6">
            <label class="form-label">Status</label>
            <select class="form-select" [(ngModel)]="statusFilter ">
                <option value="">All</option>
                <option value="active">Active</option>
                <option value="inactive">Inactive</option>
            </select>
        </div>
    </div>
</div>

<div class="modal-footer">
    <button type="button" class="btn btn-outline-secondary me-2" (click)="clearAll()">
        Clear All
    </button>
    <button type="button" class="btn btn-secondary" (click)="close()">
        Close
    </button>
    <button type="button" class="btn btn-custom" (click)="applyFilters()">
        Apply Filters
    </button>
</div>
