<form [formGroup]="form" (ngSubmit)="submit()" novalidate>
  <div class="modal-header">
    <h4 class="modal-title">{{ packageFeature ? 'Edit' : 'Add New' }} Package Feature</h4>
    <button type="button" class="btn-close" (click)="activeModal.dismiss()"></button>
  </div>

  <div class="modal-body">
    <div class="row">
      <!-- Package -->
      <div class="col-md-6">
        <label class="form-label">Package <span class="text-danger">*</span></label>
        <select class="form-select" formControlName="package_id"
          [ngClass]="{ 'is-invalid': submitted && f['package_id'].invalid, 'is-valid': submitted && f['package_id'].valid }">
          <option value="">Select Package</option>
          <option *ngFor="let package of packages" [value]="package.id">
            {{ package.name }}
          </option>
        </select>
        <div *ngIf="submitted && f['package_id'].invalid" class="invalid-feedback">
          Package is required.
        </div>
      </div>

      <!-- Sort Order -->
      <div class="col-md-6">
        <label class="form-label">Sort Order <span class="text-danger">*</span></label>
        <input type="number" class="form-control" formControlName="sort_order" placeholder="Enter sort order" min="1"
          [ngClass]="{ 'is-invalid': submitted && f['sort_order'].invalid, 'is-valid': submitted && f['sort_order'].valid }" />
        <div *ngIf="submitted && f['sort_order'].invalid" class="invalid-feedback">
          <div *ngIf="f['sort_order'].errors?.['required']">Sort order is required.</div>
          <div *ngIf="f['sort_order'].errors?.['min']">Sort order must be at least 1.</div>
        </div>
      </div>

      <!-- Title -->
      <div class="col-md-12 mt-3">
        <label class="form-label">Title <span class="text-danger">*</span></label>
        <input class="form-control" formControlName="title" placeholder="Enter feature title"
          [ngClass]="{ 'is-invalid': submitted && f['title'].invalid, 'is-valid': submitted && f['title'].valid }" />
        <div *ngIf="submitted && f['title'].invalid" class="invalid-feedback">
          Title is required.
        </div>
      </div>

      <!-- Description -->
      <div class="col-md-12 mt-3">
        <label class="form-label">Description <span class="text-danger">*</span></label>
        <textarea class="form-control" formControlName="description" placeholder="Enter feature description" rows="4"
          [ngClass]="{ 'is-invalid': submitted && f['description'].invalid, 'is-valid': submitted && f['description'].valid }"></textarea>
        <div *ngIf="submitted && f['description'].invalid" class="invalid-feedback">
          Description is required.
        </div>
      </div>

      <!-- Image -->
      <div class="col-md-12 mt-3">
        <label class="form-label">Upload Image</label>
        <input type="file" class="form-control" (change)="onFileChange($event)" accept="image/*">
        <small class="text-muted">Optional image for the package feature</small>
      </div>

    </div>
  </div>

  <div class="modal-footer">
    <button type="button" class="btn btn-sm btn-light" (click)="activeModal.dismiss()">
      <i class="fe fe-x me-2"></i>Close
    </button>

    <button type="submit" class="btn btn-sm btn-custom" [disabled]="(httpService.getLoading('addEditPackageFeature') | async)">
      <ng-container *ngIf="(httpService.getLoading('addEditPackageFeature') | async)">
        <span class="spinner-border spinner-border-sm me-2"></span> Saving...
      </ng-container>
      <ng-container *ngIf="!(httpService.getLoading('addEditPackageFeature') | async)">
        <i class="fe fe-check me-2"></i> Save
      </ng-container>
    </button>
  </div>
</form>
