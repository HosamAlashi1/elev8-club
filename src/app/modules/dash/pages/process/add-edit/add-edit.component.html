<form [formGroup]="form" (ngSubmit)="submit()" novalidate>
  <div class="modal-header">
    <h4 class="modal-title">{{ process ? 'Edit' : 'Add New' }} Process</h4>
    <button type="button" class="btn-close" (click)="activeModal.dismiss()"></button>
  </div>

  <div class="modal-body">
    <div class="row">
      <!-- Step Number -->
      <div class="col-12 mb-3">
        <label class="form-label">Step Number <span class="text-danger">*</span></label>
        <input 
          type="number" 
          class="form-control" 
          formControlName="step" 
          placeholder="Enter step number (e.g., 1, 2, 3...)"
          min="1"
          [ngClass]="{ 'is-invalid': submitted && f['step'].invalid, 'is-valid': submitted && f['step'].valid }" 
        />
        <div *ngIf="submitted && f['step'].invalid" class="invalid-feedback">
          <div *ngIf="f['step'].errors?.['required']">Step number is required.</div>
          <div *ngIf="f['step'].errors?.['min']">Step number must be at least 1.</div>
        </div>
      </div>

      <!-- Title -->
      <div class="col-12 mb-3">
        <label class="form-label">Process Title <span class="text-danger">*</span></label>
        <input 
          class="form-control" 
          formControlName="title" 
          placeholder="Enter process title"
          [ngClass]="{ 'is-invalid': submitted && f['title'].invalid, 'is-valid': submitted && f['title'].valid }" 
        />
        <div *ngIf="submitted && f['title'].invalid" class="invalid-feedback">
          Process title is required.
        </div>
      </div>

      <!-- Description -->
      <div class="col-12 mb-3">
        <label class="form-label">Process Description <span class="text-danger">*</span></label>
        <textarea 
          class="form-control" 
          rows="4" 
          formControlName="description" 
          placeholder="Enter detailed description of this process step"
          [ngClass]="{ 'is-invalid': submitted && f['description'].invalid, 'is-valid': submitted && f['description'].valid }"
        ></textarea>
        <div *ngIf="submitted && f['description'].invalid" class="invalid-feedback">
          Process description is required.
        </div>
      </div>
    </div>
  </div>

  <div class="modal-footer">
    <button type="button" class="btn btn-sm btn-light" (click)="activeModal.dismiss()">
      <i class="fe fe-x me-2"></i>Cancel
    </button>
    <button type="submit" class="btn btn-sm btn-custom" [disabled]="(httpService.getLoading('addEditProcess') | async)">
      <ng-container *ngIf="(httpService.getLoading('addEditProcess') | async)">
        <span class="spinner-border spinner-border-sm me-2"></span> Saving...
      </ng-container>
      <ng-container *ngIf="!(httpService.getLoading('addEditProcess') | async)">
        <i class="fe fe-check me-2"></i> {{ process ? 'Update' : 'Create' }} Process
      </ng-container>
    </button>
  </div>
</form>
