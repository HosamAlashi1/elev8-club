<div class="modal-header d-block">
  <h4 class="modal-title mb-0">
    {{ location.firstAddress || 'Map View' }}
  </h4>

  <small *ngIf="location.secondAddress" class="text-muted">
    {{ location.secondAddress }}
  </small>

  <button type="button" class="btn-close position-absolute top-0 end-0 mt-2 me-2" aria-label="Close" (click)="activeModal.dismiss()"></button>
</div>


<div class="modal-body">
  <google-map
    height="400px"
    width="100%"
    [center]="location"
    [zoom]="15">
    <map-marker [position]="location"></map-marker>
  </google-map>
</div>
