<div class="header">
    <div class="container-fluid">
        <div class="header-body">
            <div class="row align-items-center justify-content-between">
                <div class="col">
                    <h2 class="header-title">
                        <lucide-icon [name]="'store'"></lucide-icon>
                        Restaurants <small>({{ totalCount }})</small>
                    </h2>
                </div>
                <div class="col-auto">
                    <button class="btn btn-sm btn-custom rounded-pill px-3" (click)="add()">
                        <i class="fe fe-plus me-2"></i>
                        <span>Add Restaurant</span>
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="container-fluid">
    <div class="card">
        <div class="card-header d-flex justify-content-between align-items-center">
            <div
                class="d-flex align-items-center input-group-merge input-group-flush input-group position-relative w-50">
                <i class="fe fe-search text-muted position-absolute mb-1 me-3"></i>
                <input [(ngModel)]="searchText" class="form-control m-0 ps-4" placeholder="Type to search..."
                    (ngModelChange)="onSearchChange()" />
            </div>

            <div class="d-flex align-items-center gap-3">
                <app-modern-select 
                    [options]="statusOptions"
                    [(ngModel)]="statusFilter"
                    (selectionChange)="onFilterChange()"
                    placeholder="All Statuses"
                    [icon]="'fe fe-filter'"
                    [clearable]="true"
                    size="sm"
                    minWidth="160px">
                </app-modern-select>

                <button class="btn btn-sm btn-danger d-flex align-items-center gap-2" (click)="reset()">
                    <i class="fe fe-rotate-ccw"></i>
                    <span>Reset</span>
                </button>
            </div>
        </div>

        <div class="table-responsive">
            <table class="table table-sm table-nowrap card-table table-hover">
                <thead>
                    <tr>
                        <th class="w-10">#NO</th>
                        <th class="w-15">Image</th>
                        <th class="w-25">Name</th>
                        <th class="w-20">Location</th>
                        <th class="w-20">Status</th>
                        <th class="w-10">Actions</th>
                    </tr>
                </thead>

                <!-- Loading skeletons -->
                <tbody *ngIf="isLoading$ | async">
                    <tr *ngFor="let number of [].constructor(size + 1)">
                        <td *ngFor="let i of [].constructor(6)">
                            <ngx-skeleton-loader appearance="line" animation="progress-dark"
                                [theme]="{ width: '50%', height: '32px', 'border-radius': '3px', margin: '0' }">
                            </ngx-skeleton-loader>
                        </td>
                    </tr>
                </tbody>

                <!-- Data display -->
                <tbody *ngIf="!(isLoading$ | async) && restaurants.length > 0">
                    <tr *ngFor="let restaurant of restaurants; let i = index">
                        <td>#{{ i + 1 }}</td>
                        <td>
                            <img [src]="restaurant.image && restaurant.image.trim() !== '' ? restaurant.image : 'assets/img/blank.png'"
                                alt="profile image" class="avatar-img avatar rounded-circle cursor-pointer"
                                (click)="openImageModal(restaurant.image && restaurant.image.trim() !== '' ? restaurant.image : 'assets/img/blank.png')" />
                        </td>
                        <td>{{ restaurant.name }}</td>
                        <td>
                            <button class="btn btn-sm btn-outline-custom" (click)="viewOnMap(restaurant)">
                                <i class="fe fe-map-pin me-1"></i> Map
                            </button>
                        </td>
                        <td>
                            <div class="form-check form-switch custom-switch-pink">
                                <input type="checkbox" class="form-check-input" [checked]="restaurant.status === 1"
                                    (change)="toggleStatus(restaurant)" />
                            </div>
                        </td>
                        <td>
                            <div class="btn-group dropstart">
                                <span data-bs-toggle="dropdown" aria-expanded="false">
                                    <i class="fe fe-more-vertical black-menu fs-2"></i>
                                </span>
                                <ul class="dropdown-menu">
                                    <li>
                                        <a class="dropdown-item" (click)="openMeals(restaurant)">
                                            <i class="far fa-clipboard me-1"></i>
                                            Manage Meals
                                        </a>
                                    </li>
                                    <li>
                                        <a class="dropdown-item" (click)="edit(restaurant)">
                                            <i class="fe fe-edit me-2"></i>Edit
                                        </a>
                                    </li>
                                    <li>
                                        <hr class="m-2" />
                                    </li>
                                    <li>
                                        <a class="dropdown-item" (click)="delete(restaurant)">
                                            <i class="fe fe-trash-2 text-danger me-2"></i>
                                            <span class="text-danger">Delete</span>
                                        </a>
                                    </li>
                                </ul>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <app-no-results [isLoading$]="isLoading$" [totalRecords]="totalCount"></app-no-results>
        <app-pagination [isLoading$]="isLoading$" [totalRecords]="totalCount" [size]="size" (pageChange)="list($event)">
        </app-pagination>
    </div>
</div>
