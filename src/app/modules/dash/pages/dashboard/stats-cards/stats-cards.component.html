<div class="row g-4 stats-cards-row">
  <!-- Top Author -->
  <div class="col-md-4">
    <div class="card shadow-sm stats-card author-card">
      <div class="card-header fw-bolder fs-3">
        <i class="fe fe-users me-2 text-primary"></i>
        Top Author
      </div>
      <div class="card-body">
        <div class="author-item" *ngFor="let author of topAuthors; let i = index">
          <div class="d-flex align-items-center mb-4">
            <div class="author-avatar-wrapper">
              <img [src]="author.img" 
                   class="rounded-circle me-3 author-avatar" 
                   width="64" height="64" 
                   [alt]="author.name"
                   (error)="onImageError($event)">
              <div class="author-rank">#{{i + 1}}</div>
            </div>
            <div class="author-info">
              <div class="fw-bold author-name">{{ author.name }}</div>
              <small class="author-sales">
                <i class="fe fe-book-open me-1"></i>
                {{ author.sales }} books sold this month
              </small>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Best-Selling Category -->
  <div class="col-md-4">
    <div class="card shadow-sm stats-card category-card">
      <div class="card-header fw-bolder fs-3">
        <i class="fe fe-pie-chart me-2 text-success"></i>
        Best-Selling Category
      </div>
      <div class="card-body d-flex justify-content-center align-items-center">
        <div class="chart-wrapper">
          <apx-chart [series]="categoryChart.series" 
                     [chart]="categoryChart.chart"
                     [labels]="categoryChart.labels" 
                     [colors]="categoryChart.colors"
                     [legend]="categoryChart.legend">
          </apx-chart>
        </div>
      </div>
    </div>
  </div>

  <!-- Refund Rate -->
  <div class="col-md-4">
    <div class="card shadow-sm stats-card refund-card text-center">
      <div class="card-header fw-bolder fs-3">
        <i class="fe fe-refresh-cw me-2 text-warning"></i>
        Refund Rate
      </div>
      <div class="card-body d-flex flex-column justify-content-center">
        <div class="refund-content">
          <h1 class="fw-bolder refund-rate" style="font-size: 2.5rem;">
            {{ refundRate.rate }}
          </h1>
          <div class="refund-change" [style.color]="refundRate.changeColor">
            <i class="fe fe-trending-down me-1"></i>
            {{ refundRate.change }}
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
