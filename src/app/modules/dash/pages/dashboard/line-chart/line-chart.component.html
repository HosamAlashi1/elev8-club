<div class="card shadow-sm equal-height-card">
    <div class="card-header fw-bold d-flex align-items-center">
        <h4>
            <i class="fa fa-envelope me-2"></i>
            <span>Weekly Contact Messages</span>
        </h4>
    </div>
    <div class="card-body" [style.height]="'calc(100dvh - 343px)'">
        <apx-chart [series]="chartOptionsWeeklySubscribers.series" [chart]="chartOptionsWeeklySubscribers.chart"
            [xaxis]="chartOptionsWeeklySubscribers.xaxis" [dataLabels]="chartOptionsWeeklySubscribers.dataLabels"
            [stroke]="chartOptionsWeeklySubscribers.stroke" [colors]="chartOptionsWeeklySubscribers.colors"
            [tooltip]="chartOptionsWeeklySubscribers.tooltip" [fill]="chartOptionsWeeklySubscribers.fill"
            [legend]="chartOptionsWeeklySubscribers.legend">
        </apx-chart>

    </div>
</div>
