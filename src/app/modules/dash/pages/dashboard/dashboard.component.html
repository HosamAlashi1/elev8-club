<div class="p-3">
    <!-- Header -->
    <div class="header">
        <div class="container-fluid">
            <div class="header-body border-0">
                <div class="row align-items-center">
                    <div class="col">
                        <h1 class="header-title fw-bold">Dashboard Overview</h1>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="container-fluid">
        <!-- Dashboard Content -->
        <ng-container>
            <!-- Stat Cards Row -->
            <div class="row g-4 mb-4">
                <div class="col-md-3" *ngFor="let card of dashboardCards; let i = index">
                    <div class="stat-card">
                        <!-- Icon -->
                        <div class="stat-icon mb-3" [ngClass]="card.iconClass">
                            <i [class]="card.icon"></i>
                        </div>

                        <!-- Label -->
                        <div class="stat-label">{{ card.label }}</div>

                        <!-- Value -->
                        <div class="stat-value">{{ card.prefix }}{{ numbers[i] | number }}</div>
                    </div>
                </div>
            </div>

            <!-- Leads Per Day Chart -->
            <div class="row mt-4">
                <div class="col-md-12 equal-height-col">
                    <app-line-chart [revenueData]="leadsPerDayData"></app-line-chart>
                </div>
            </div>
        </ng-container>
    </div>
</div>
