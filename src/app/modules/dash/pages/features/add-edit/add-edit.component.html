<form [formGroup]="form" (ngSubmit)="submit()" novalidate>
  <div class="modal-header">
    <h4 class="modal-title">{{ feature ? 'Edit' : 'Add New' }} Feature</h4>
    <button type="button" class="btn-close" (click)="activeModal.dismiss()"></button>
  </div>

  <div class="modal-body">
    <div class="row">
      <!-- Title -->
      <div class="col-md-12">
        <label class="form-label">Title <span class="text-danger">*</span></label>
        <input 
          class="form-control" 
          formControlName="title" 
          placeholder="Enter feature title"
          [ngClass]="{ 'is-invalid': submitted && f['title'].invalid, 'is-valid': submitted && f['title'].valid }" 
        />
        <div *ngIf="submitted && f['title'].invalid" class="invalid-feedback">
          Title is required.
        </div>
      </div>

      <!-- Description -->
      <div class="col-md-12 mt-3">
        <label class="form-label">Description <span class="text-danger">*</span></label>
        <textarea 
          class="form-control" 
          formControlName="description" 
          placeholder="Enter feature description"
          rows="4"
          [ngClass]="{ 'is-invalid': submitted && f['description'].invalid, 'is-valid': submitted && f['description'].valid }"
        ></textarea>
        <div *ngIf="submitted && f['description'].invalid" class="invalid-feedback">
          Description is required.
        </div>
      </div>

      <!-- Image Upload -->
      <div class="col-md-12 mt-3">
        <label class="form-label">Feature Image <span class="text-danger" *ngIf="!feature">*</span></label>
        <input 
          type="file" 
          class="form-control" 
          accept="image/*"
          (change)="onFileSelected($event)"
          [ngClass]="{ 'is-invalid': submitted && f['image'].invalid, 'is-valid': submitted && f['image'].valid }"
        />
        <div *ngIf="submitted && f['image'].invalid" class="invalid-feedback">
          Feature image is required.
        </div>
        
        <!-- Image Preview -->
        <div *ngIf="imagePreview" class="mt-3">
          <img [src]="imagePreview" alt="Preview" class="img-thumbnail" style="max-width: 200px; max-height: 200px;">
        </div>
      </div>
    </div>
  </div>

  <div class="modal-footer">
    <button type="button" class="btn btn-sm btn-light" (click)="activeModal.dismiss()">
      <i class="fe fe-x me-2"></i>Close
    </button>

    <button type="submit" class="btn btn-sm btn-custom" [disabled]="(httpService.getLoading('addEditFeature') | async)">
      <ng-container *ngIf="(httpService.getLoading('addEditFeature') | async)">
        <span class="spinner-border spinner-border-sm me-2"></span> Saving...
      </ng-container>
      <ng-container *ngIf="!(httpService.getLoading('addEditFeature') | async)">
        <i class="fe fe-check me-2"></i> Save
      </ng-container>
    </button>
  </div>
</form>
