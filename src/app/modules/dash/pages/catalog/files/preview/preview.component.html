<div class="modal-header border-0 pb-0">
  <button type="button" class="btn-close" (click)="activeModal.dismiss()"></button>
</div>

<div class="modal-body preview-wrap">
  <!-- المعاينة اليسرى -->
  <!-- المعاينة اليسرى -->
  <div class="preview-left d-flex justify-content-center align-items-center bg-light rounded"
    style="min-height: 300px;">
    <ng-container [ngSwitch]="getFriendlyType(file.file_type)">

      <!-- 🖼️ صورة -->
      <img *ngSwitchCase="'Image'" [src]="file.file_url" alt="Preview Image"
        class="w-100 h-100 object-fit-cover rounded shadow-sm" />

      <!-- 📄 PDF -->
      <div *ngSwitchCase="'PDF'" class="text-center text-danger p-5">
        <i class="fe fe-file-text fs-1 mb-3 d-block"></i>
        <p class="mb-0 fw-semibold">PDF File</p>
      </div>

      <!-- 📝 Word -->
      <div *ngSwitchCase="'Word'" class="text-center text-primary p-5">
        <i class="fe fe-file fs-1 mb-3 d-block"></i>
        <p class="mb-0 fw-semibold">Word Document</p>
      </div>

      <!--  Audio -->
      <div *ngSwitchCase="'Audio'" class="text-center text-warning p-5">
        <i class="fe fe-mic fs-1 mb-3 d-block"></i>
        <p class="mb-0 fw-semibold">Audio File</p>
      </div>

      <!-- 🎥 Video -->
      <div *ngSwitchCase="'Video'" class="text-center text-info p-5">
        <i class="fe fe-video fs-1 mb-3 d-block"></i>
        <p class="mb-0 fw-semibold">Video File</p>
      </div>

      <!-- 📦 أي نوع آخر -->
      <div *ngSwitchDefault class="text-center text-muted p-5">
        <i class="fe fe-file fs-1 mb-3 d-block"></i>
        <p class="mb-0 fw-semibold">Unsupported File</p>
      </div>

    </ng-container>
  </div>


  <!-- التفاصيل -->
  <div class="preview-right">
    <h2 class="modal-title mb-4">Preview</h2>
    <ul class="list-unstyled mb-4">
      <li class="pair">
        <div class="label">File Name</div>
        <div class="value">{{ file.file_name }}</div>
      </li>
      <li class="pair">
        <div class="label">File Type</div>
        <div class="value">{{ getFriendlyType(file.file_type) }}</div>
      </li>
      <li class="pair">
        <div class="label">Size</div>
        <div class="value">{{ file.file_size }}</div>
      </li>
      <li class="pair">
        <div class="label">Upload Date</div>
        <div class="value">{{ file.insert_date | date:'MMM d, y' }}</div>
      </li>
    </ul>

    <div class="btns">
      <button type="button" class="btn btn-custom d-flex align-items-center justify-content-center gap-2"
        (click)="downloadFile()">
        <i class="fe fe-download"></i> Download
      </button>

      <button type="button" class="btn btn-outline-secondary" (click)="replaceFile()"
        *ngIf="publicService.hasPermission('EDIT_FILE')">
        <i class="fe fe-refresh-cw me-2"></i> Replace
      </button>
    </div>

  </div>
</div>
