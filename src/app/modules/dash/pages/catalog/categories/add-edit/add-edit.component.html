<form [formGroup]="form" (ngSubmit)="submit()" novalidate>
  <div class="modal-header">
    <h4 class="modal-title">{{ category ? 'Edit Category' : 'Add New Category' }}</h4>
    <button type="button" class="btn-close" (click)="activeModal.dismiss()"></button>
  </div>

  <div class="modal-body">
    <div class="row">
      <!-- Category Name -->
      <div class="col-12 mb-3">
        <label class="form-label">Category Name <span class="text-danger">*</span></label>
        <input class="form-control" formControlName="name" placeholder="Enter category name"
          [ngClass]="{ 'is-invalid': submitted && f['name'].invalid, 'is-valid': submitted && f['name'].valid }" />
        <div *ngIf="submitted && f['name'].invalid" class="invalid-feedback">
          Category name is required.
        </div>
      </div>

      <!-- Description -->
      <div class="col-12 mb-3">
        <label class="form-label">Description <span class="text-danger">*</span></label>
        <textarea class="form-control" rows="3" formControlName="description" placeholder="Enter category description"
          [ngClass]="{ 'is-invalid': submitted && f['description'].invalid, 'is-valid': submitted && f['description'].valid }"></textarea>
        <div *ngIf="submitted && f['description'].invalid" class="invalid-feedback">
          Description is required.
        </div>
      </div>

      <!-- Category Icon -->
      <div class="col-12 mb-3">
        <label class="form-label">Category Icon <span class="text-danger" *ngIf="!category">*</span></label>


        <div class="upload-box border rounded d-flex flex-column align-items-center justify-content-center py-4 position-relative"
          [class.drag-over]="isDragOver" (dragover)="onDragOver($event)" (dragleave)="onDragLeave($event)"
          (drop)="onDrop($event)" style="border: 2px dashed #E5E7EB !important; cursor: pointer;">
          <!-- input يغطي البوكس بالكامل ويكون شفاف -->
          <input type="file" class="file-input-overlay" (change)="onFileChange($event)" accept="image/*" />
          <ng-container *ngIf="imagePreview; else uploadPlaceholder">
            <img [src]="imagePreview" alt="Preview" class="img-preview" />
          </ng-container>
          <ng-template #uploadPlaceholder>
            <i class="fe fe-upload mb-2" style="color: #6B7280; font-size: 34px;"></i>
            <div class="text-muted" style="color: #6B7280;">
              Drag and drop an icon here, or click to select
            </div>
          </ng-template>
        </div>

        <div *ngIf="submitted && f['icon'].invalid" class="invalid-feedback d-block">
          Icon is required.
        </div>
        <small class="text-muted" *ngIf="category">Leave empty to keep current icon</small>
      </div>


      <!-- Status -->
      <div class="col-12 mb-3">
        <label class="form-label d-block">Status</label>
        <div class="form-check form-switch custom-switch-pink">
          <input type="checkbox" class="form-check-input" formControlName="status" style="width: 48px; height: 24px;" />
          <label class="form-check-label mt-1 me-1" style="color: #6B7280;">
            {{ form.get('status')?.value ? 'Active' : 'Inactive' }}
          </label>
        </div>
      </div>
    </div>
  </div>

  <div class="modal-footer">
    <button type="button" class="btn btn-secondary" (click)="activeModal.dismiss()">Cancel</button>
    <button type="submit" class="btn btn-sm btn-custom" [disabled]="(httpService.getLoading('addEditUser') | async)">
      <ng-container *ngIf="(httpService.getLoading('addEditUser') | async)">
        <span class="spinner-border spinner-border-sm me-2"></span> Saving...
      </ng-container>
      <ng-container *ngIf="!(httpService.getLoading('addEditUser') | async)">
        <i class="fe fe-check me-2"></i> Save
      </ng-container>
    </button>
  </div>
</form>
