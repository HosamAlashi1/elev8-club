<form [formGroup]="form" (ngSubmit)="submit()" novalidate>
  <div class="modal-header">
    <h4 class="modal-title">{{ isEdit ? 'Edit Book' : 'Add New Book' }}</h4>
    <button type="button" class="btn-close" (click)="activeModal.dismiss()"></button>
  </div>

  <div class="modal-body">
    <div class="row">
      <!-- Title -->
      <div class="col-12 mb-3">
        <label class="form-label">Title <span class="text-danger">*</span></label>
        <input type="text" class="form-control" formControlName="title" placeholder="Enter book title" [ngClass]="{
            'is-invalid': submitted && f['title'].invalid,
            'is-valid': submitted && f['title'].valid
          }" />
        <div *ngIf="submitted && f['title'].invalid" class="invalid-feedback">
          Title is required.
        </div>
      </div>

      <!-- ISBN -->
      <div class="col-md-6 mb-3">
        <label class="form-label">ISBN <span class="text-danger">*</span></label>
        <input type="text" class="form-control" formControlName="isbn" placeholder="Enter ISBN" [ngClass]="{
            'is-invalid': submitted && f['isbn'].invalid,
            'is-valid': submitted && f['isbn'].valid
          }" />
        <div *ngIf="submitted && f['isbn'].invalid" class="invalid-feedback">
          ISBN is required.
        </div>
      </div>

      <!-- Price -->
      <div class="col-md-3 mb-3">
        <label class="form-label">Price ($) <span class="text-danger">*</span></label>
        <input type="number" step="0.01" class="form-control" formControlName="price" placeholder="0.00" [ngClass]="{
            'is-invalid': submitted && f['price'].invalid,
            'is-valid': submitted && f['price'].valid
          }" />
        <div *ngIf="submitted && f['price'].invalid" class="invalid-feedback">
          Price is required.
        </div>
      </div>

      <!-- Stock -->
      <div class="col-md-3 mb-3">
        <label class="form-label">Stock <span class="text-danger">*</span></label>
        <input type="number" class="form-control" formControlName="stock" placeholder="Enter stock quantity" [ngClass]="{
            'is-invalid': submitted && f['stock'].invalid,
            'is-valid': submitted && f['stock'].valid
          }" />
        <div *ngIf="submitted && f['stock'].invalid" class="invalid-feedback">
          Stock is required.
        </div>
      </div>

      <!-- Category -->
      <div class="col-md-6 mb-3">
        <label class="form-label">Category <span class="text-danger">*</span></label>

        <app-modern-select formControlName="category_id" [options]="categoryOptions" placeholder2="Select Category"
          size="sm" [minWidth]="'100%'" [backgroundColor]="'#fff'" [textColor]="'#495057'" [customWidth]="'100%'">
        </app-modern-select>

        <div *ngIf="submitted && f['category_id'].invalid" class="invalid-feedback d-block">
          Category is required.
        </div>
      </div>


      <!-- Author -->
      <div class="col-md-6 mb-3" [ngClass]="{
          'is-invalid': submitted && f['author_id'].invalid,
          'is-valid': submitted && f['author_id'].valid
        }">
        <label class="form-label">Author <span class="text-danger">*</span></label>
        <app-searchable-select formControlName="author_id" [options]="authors" [loading]="authorsLoading"
          placeholder="Search and select author..." displayField="full_name" valueField="id"
          [searchFields]="['full_name', 'name', 'title']" [clearable]="true" [required]="true" [inputHeight]="'38px'"
          (searchChange)="onAuthorSearch($event)" (dropdownOpen)="loadInitialAuthors()">
        </app-searchable-select>
        <div *ngIf="submitted && f['author_id'].invalid" class="invalid-feedback d-block">
          Author is required.
        </div>
      </div>

      <!-- Cover Image -->
      <div class="col-12 mb-3">
        <label class="form-label">Book Cover <span class="text-danger" *ngIf="!isEdit">*</span></label>

        <div
          class="upload-box border rounded d-flex flex-column align-items-center justify-content-center py-4 position-relative"
          [class.drag-over]="isDragOver" (dragover)="onDragOver($event)" (dragleave)="onDragLeave($event)"
          (drop)="onDrop($event)" style="border: 2px dashed #E5E7EB !important; cursor: pointer;">
          <input type="file" class="file-input-overlay" (change)="onFileChange($event)" accept="image/*" />

          <ng-container *ngIf="imagePreview; else uploadPlaceholder">
            <img [src]="imagePreview" alt="Preview" class="img-preview" />
          </ng-container>

          <ng-template #uploadPlaceholder>
            <i class="fe fe-upload mb-2" style="color: #6B7280; font-size: 34px;"></i>
            <div class="text-muted" style="color: #6B7280;">
              Drag and drop a cover image, or click to select
            </div>
          </ng-template>
        </div>

        <div *ngIf="submitted && f['file'].invalid" class="invalid-feedback d-block">
          Cover image is required.
        </div>
        <small class="text-muted" *ngIf="isEdit">Leave empty to keep current cover</small>
      </div>
    </div>
  </div>

  <div class="modal-footer">
    <button type="button" class="btn btn-secondary" (click)="activeModal.dismiss()">Cancel</button>
    <button type="submit" class="btn btn-sm btn-custom"
      [disabled]="(httpService.getLoading(isEdit ? 'editBook' : 'addBook') | async)">
      <ng-container *ngIf="(httpService.getLoading(isEdit ? 'editBook' : 'addBook') | async)">
        <span class="spinner-border spinner-border-sm me-2"></span> Saving...
      </ng-container>
      <ng-container *ngIf="!(httpService.getLoading(isEdit ? 'editBook' : 'addBook') | async)">
        <i class="fe fe-check me-2"></i> Save
      </ng-container>
    </button>
  </div>
</form>
