<form [formGroup]="form" (ngSubmit)="submit()" novalidate>
  <div class="modal-header">
    <h4 class="modal-title">{{ package ? 'Edit' : 'Add New' }} Package</h4>
    <button type="button" class="btn-close" (click)="activeModal.dismiss()"></button>
  </div>

  <div class="modal-body">
    <div class="row">
      <!-- Name -->
      <div class="col-md-6">
        <label class="form-label">Name <span class="text-danger">*</span></label>
        <input class="form-control" formControlName="name" placeholder="Enter package name"
          [ngClass]="{ 'is-invalid': submitted && f['name'].invalid, 'is-valid': submitted && f['name'].valid }" />
        <div *ngIf="submitted && f['name'].invalid" class="invalid-feedback">
          Package name is required.
        </div>
      </div>

      <!-- Price -->
      <div class="col-md-6">
        <label class="form-label">Price <span class="text-danger">*</span></label>
        <input type="number" class="form-control" formControlName="price" placeholder="Enter price" min="0" step="0.01"
          [ngClass]="{ 'is-invalid': submitted && f['price'].invalid, 'is-valid': submitted && f['price'].valid }" />
        <div *ngIf="submitted && f['price'].invalid" class="invalid-feedback">
          <div *ngIf="f['price'].errors?.['required']">Price is required.</div>
          <div *ngIf="f['price'].errors?.['min']">Price must be at least 0.</div>
        </div>
      </div>

      <!-- Sort Order -->
      <div class="col-md-6 mt-3">
        <label class="form-label">Sort Order <span class="text-danger">*</span></label>
        <input type="number" class="form-control" formControlName="sort_order" placeholder="Enter sort order" min="1"
          [ngClass]="{ 'is-invalid': submitted && f['sort_order'].invalid, 'is-valid': submitted && f['sort_order'].valid }" />
        <div *ngIf="submitted && f['sort_order'].invalid" class="invalid-feedback">
          <div *ngIf="f['sort_order'].errors?.['required']">Sort order is required.</div>
          <div *ngIf="f['sort_order'].errors?.['min']">Sort order must be at least 1.</div>
        </div>
      </div>

      <!-- Description -->
      <div class="col-md-12 mt-3">
        <label class="form-label">Description <span class="text-danger">*</span></label>
        <textarea class="form-control" formControlName="description" placeholder="Enter package description" rows="4"
          [ngClass]="{ 'is-invalid': submitted && f['description'].invalid, 'is-valid': submitted && f['description'].valid }"></textarea>
        <div *ngIf="submitted && f['description'].invalid" class="invalid-feedback">
          Description is required.
        </div>
      </div>

      <!-- Image -->
      <div class="col-md-12 mt-3">
        <label class="form-label">Upload Image</label>
        <input type="file" class="form-control" (change)="onFileChange($event)" accept="image/*">
        <small class="text-muted">Optional image for the package</small>
      </div>

    </div>
  </div>

  <div class="modal-footer">
    <button type="button" class="btn btn-sm btn-light" (click)="activeModal.dismiss()">
      <i class="fe fe-x me-2"></i>Close
    </button>

    <button type="submit" class="btn btn-sm btn-custom" [disabled]="(httpService.getLoading('addEditPackage') | async)">
      <ng-container *ngIf="(httpService.getLoading('addEditPackage') | async)">
        <span class="spinner-border spinner-border-sm me-2"></span> Saving...
      </ng-container>
      <ng-container *ngIf="!(httpService.getLoading('addEditPackage') | async)">
        <i class="fe fe-check me-2"></i> Save
      </ng-container>
    </button>
  </div>
</form>
