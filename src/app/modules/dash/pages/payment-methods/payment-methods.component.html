<div class="header">
  <div class="container-fluid">
    <div class="header-body">
      <div class="row align-items-center justify-content-between">
        <div class="col">
          <h2 class="header-title">
            <lucide-icon [name]="'credit-card'"></lucide-icon>
            Payment Methods <small>({{ totalCount }})</small>
          </h2>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="container-fluid">
  <div class="card">
    <div class="card-header d-flex justify-content-between align-items-center">
      <div
        class="d-flex align-items-center input-group-merge input-group-flush input-group position-relative w-50"
      >
        <i class="fe fe-search text-muted position-absolute mb-1 me-3"></i>
        <input
          [(ngModel)]="searchText"
          class="form-control m-0 ps-4"
          placeholder="Type to search..."
          (ngModelChange)="onSearchChange()"
        />
      </div>

      <div class="d-flex align-items-center gap-3">
        <button
          class="btn btn-sm btn-danger d-flex align-items-center gap-2"
          (click)="reset()"
        >
          <i class="fe fe-rotate-ccw"></i>
          <span>Reset</span>
        </button>
      </div>
    </div>

    <div class="table-responsive">
      <table class="table table-sm table-nowrap card-table table-hover">
        <thead>
          <tr>
            <th class="w-10">#NO</th>
            <th class="w-15">Image</th>
            <th class="w-20">Name</th>
            <!-- <th class="w-15">Gateway</th>
            <th class="w-15">Type</th> -->
            <th class="w-10">Status</th>
            <!-- <th class="w-10">Sort Order</th> -->
            <!-- <th class="w-5">Details</th> -->
          </tr>
        </thead>

        <!-- Loading skeletons -->
        <tbody *ngIf="isLoading$ | async">
          <tr *ngFor="let number of [].constructor(size + 1)">
            <td *ngFor="let i of [].constructor(4)">
              <ngx-skeleton-loader
                appearance="line"
                animation="progress-dark"
                [theme]="{
                  width: '50%',
                  height: '33px',
                  'border-radius': '3px',
                  margin: '0'
                }"
              >
              </ngx-skeleton-loader>
            </td>
          </tr>
        </tbody>

        <tbody *ngIf="!(isLoading$ | async)">
          <tr *ngFor="let method of paymentMethods; let i = index">
            <td>#{{ i + 1 }}</td>
            <td>
              <img
                [src]="method.image || 'assets/img/blank.png'"
                alt="payment method image"
                class="avatar-img avatar rounded cursor-pointer"
                (click)="openImageModal(method.image || 'assets/img/blank.png')"
                style="width: 40px; height: 40px; object-fit: contain;"
              />
            </td>
            <td>
              <strong>{{ method.name }}</strong>
              <br>
              <small class="text-muted">{{ method.slug }}</small>
            </td>
            <!-- <td>
              <span class="badge bg-info">{{ method.gateway }}</span>
            </td>
            <td>
              <span class="badge bg-secondary">{{ method.pm_type }}</span>
            </td> -->
            <td>
              <span class="badge" [ngClass]="getStatusBadgeClass(method.is_active)">
                {{ getStatusText(method.is_active) }}
              </span>
            </td>
            <!-- <td>
              <span class="badge bg-primary">{{ method.sort_order }}</span>
            </td>
            <td>
              <button class="btn btn-sm btn-outline-primary" title="View Details">
                <i class="fe fe-eye"></i>
              </button>
            </td> -->
          </tr>
        </tbody>
      </table>
    </div>

    <app-no-results
      [isLoading$]="isLoading$"
      [totalRecords]="totalCount"
    ></app-no-results>
    <app-pagination
      [isLoading$]="isLoading$"
      [totalRecords]="totalCount"
      [size]="size"
      (pageChange)="list($event)"
    >
    </app-pagination>
  </div>
</div>
