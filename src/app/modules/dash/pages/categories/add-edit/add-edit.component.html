<form [formGroup]="form" (ngSubmit)="submit()" novalidate>
  <div class="modal-header">
    <h4 class="modal-title">{{ category ? 'Edit' : 'Add New' }} Category</h4>
    <button type="button" class="btn-close" (click)="activeModal.dismiss()"></button>
  </div>

  <div class="modal-body">
    <div class="row">
      <!-- English Title -->
      <div class="col-md-6">
        <label class="form-label">English Title <span class="text-danger">*</span></label>
        <input class="form-control" formControlName="titleEn" placeholder="Enter English title"
          [ngClass]="{ 'is-invalid': submitted && f['titleEn'].invalid, 'is-valid': submitted && f['titleEn'].valid }" />
        <div class="invalid-feedback" *ngIf="submitted && f['titleEn'].invalid">
          English title is required
        </div>
      </div>

      <!-- Arabic Title -->
      <div class="col-md-6">
        <label class="form-label">Arabic Title <span class="text-danger">*</span></label>
        <input class="form-control" formControlName="titleAr" placeholder="Enter Arabic title"
          [ngClass]="{ 'is-invalid': submitted && f['titleAr'].invalid, 'is-valid': submitted && f['titleAr'].valid }" />
        <div class="invalid-feedback" *ngIf="submitted && f['titleAr'].invalid">
          Arabic title is required
        </div>
      </div>

      <!-- Type -->
      <div class="col-md-6 mt-3">
        <label class="form-label">Type <span class="text-danger">*</span></label>
        <select class="form-select" formControlName="type"
          [ngClass]="{ 'is-invalid': submitted && f['type'].invalid, 'is-valid': submitted && f['type'].valid }">
          <option value="" disabled>Select type</option>
          <option *ngFor="let option of typeOptions" [value]="option.value">
            {{ option.label }}
          </option>
        </select>
        <div class="invalid-feedback" *ngIf="submitted && f['type'].invalid">
          Type is required
        </div>
      </div>

      <!-- Photo -->
      <div class="col-md-6 mt-3">
        <label class="form-label">Upload Photo</label>
        <input type="file" class="form-control" (change)="onFileChange($event)" accept="image/*">
        <small class="text-muted">Optional category image</small>
      </div>
    </div>

  </div>

  <div class="modal-footer">
    <button type="button" class="btn btn-sm btn-light" (click)="activeModal.dismiss()">
      <i class="fe fe-x me-2"></i>Close
    </button>

    <button type="submit" class="btn btn-sm btn-custom" [disabled]="(httpService.getLoading('addEditCategory') | async)">
      <ng-container *ngIf="(httpService.getLoading('addEditCategory') | async)">
        <span class="spinner-border spinner-border-sm me-2"></span> Saving...
      </ng-container>
      <ng-container *ngIf="!(httpService.getLoading('addEditCategory') | async)">
        <i class="fe fe-check me-2"></i> Save
      </ng-container>
    </button>
  </div>
</form>
