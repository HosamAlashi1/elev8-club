<div class="header">
  <div class="container-fluid">
    <div class="header-body">
      <div class="row align-items-center justify-content-between">
        <div class="col">
          <h2 class="header-title">
            <lucide-icon [name]="'sliders'"></lucide-icon>
            Options <small>({{ totalCount }})</small>
          </h2>
        </div>
        <div class="col-auto">
          <button
            class="btn btn-sm btn-custom rounded-pill px-3"
            (click)="add()"
          >
            <i class="fe fe-plus me-2"></i>
            <span>Add Option</span>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="container-fluid">
  <div class="card">
    <div class="card-header d-flex justify-content-between align-items-center">
      <div
        class="d-flex align-items-center input-group-merge input-group-flush input-group position-relative w-50"
      >
        <i class="fe fe-search text-muted position-absolute mb-1 me-3"></i>
        <input
          [(ngModel)]="searchText"
          class="form-control m-0 ps-4"
          placeholder="Type to search..."
          (ngModelChange)="onSearchChange()"
        />
      </div>

      <div class="d-flex align-items-center gap-3">
        <app-modern-select
          [options]="typeOptions"
          [(ngModel)]="typeFilter"
          (selectionChange)="onFilterChange()"
          placeholder="All Types"
          [icon]="'fe fe-filter'"
          [clearable]="true"
          size="sm"
          minWidth="160px"
        >
        </app-modern-select>

        <button
          class="btn btn-sm btn-danger d-flex align-items-center gap-2"
          (click)="reset()"
        >
          <i class="fe fe-rotate-ccw"></i>
          <span>Reset</span>
        </button>
      </div>
    </div>

    <div class="table-responsive">
      <table class="table table-sm table-nowrap card-table table-hover">
        <thead>
          <tr>
            <th class="w-20">#NO</th>
            <th class="w-20">Name</th>
            <th class="w-30">Value</th>
            <th class="w-20">Type</th>
            <th class="w-10">Actions</th>
          </tr>
        </thead>

        <!-- Loading skeletons -->
        <tbody *ngIf="isLoading$ | async">
          <tr *ngFor="let number of [].constructor(size + 1)">
            <td *ngFor="let i of [].constructor(5)">
              <ngx-skeleton-loader
                appearance="line"
                animation="progress-dark"
                [theme]="{
                  width: '50%',
                  height: '24px',
                  'border-radius': '3px',
                  margin: '0'
                }"
              >
              </ngx-skeleton-loader>
            </td>
          </tr>
        </tbody>

        <tbody *ngIf="!(isLoading$ | async)">
          <tr *ngFor="let option of options; let i = index">
            <td>#{{ i + 1 }}</td>
            <td>{{ option.name }}</td>
            <td>{{ option.value }}</td>
            <td>
              {{ option.typeDisplay }}
            </td>
            <td>
              <div class="btn-group dropstart">
                <span data-bs-toggle="dropdown" aria-expanded="false">
                  <i class="fe fe-more-vertical black-menu fs-2"></i>
                </span>
                <ul class="dropdown-menu">
                  <li>
                    <a class="dropdown-item" (click)="edit(option)">
                      <i class="fe fe-edit me-2"></i>Edit
                    </a>
                  </li>
                  <li>
                    <hr class="m-2" />
                  </li>
                  <li>
                    <a class="dropdown-item" (click)="delete(option)">
                      <i class="fe fe-trash-2 text-danger me-2"></i>
                      <span class="text-danger">Delete</span>
                    </a>
                  </li>
                </ul>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <app-no-results
      [isLoading$]="isLoading$"
      [totalRecords]="totalCount"
    ></app-no-results>
    <app-pagination
      [isLoading$]="isLoading$"
      [totalRecords]="totalCount"
      [size]="size"
      (pageChange)="list($event)"
    >
    </app-pagination>
  </div>
</div>
