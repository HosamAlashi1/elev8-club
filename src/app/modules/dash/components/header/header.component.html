<!-- الهيدر -->
<header class="main-header d-flex align-items-center justify-content-between px-4">
    <!-- Search -->
    <div class="search-box flex-grow-1 me-3 position-relative">
        <i class="fe fe-search search-icon"></i>
        <input type="text" class="form-control search-input ps-5" placeholder="Search...">
    </div>

    <!-- Right Section -->
    <div class="user-section">
      <!-- 🔔 Notifications -->
      <!-- <div class="notification-wrapper">
        <button class="notification-btn" (click)="toggleNotifications($event)">
          <i class="bi bi-bell"></i>
          <span class="notification-badge" *ngIf="(unreadCount$ | async) as count" [class.zero]="count === 0">
            {{ count > 99 ? '99+' : count }}
          </span>
        </button>
      </div> -->

      <!-- User Profile Dropdown -->
      <div class="dropdown">
        <button class="user-profile-btn" id="userDropdown" data-bs-toggle="dropdown" aria-expanded="false">
          <div class="avatar-wrapper">
            <img [src]="user?.image || 'assets/img/blank.png'" alt="User Avatar" class="user-avatar" />
            <div class="avatar-ring"></div>
          </div>
          <div class="user-info">
            <span class="user-name">{{ user?.first_name }} {{ user?.last_name }}</span>
            <span class="user-role">Admin</span>
          </div>
          <i class="bi bi-chevron-down dropdown-arrow"></i>
        </button>

        <ul class="dropdown-menu dropdown-menu-custom" aria-labelledby="userDropdown">
          <li class="dropdown-header">
            <div class="header-avatar">
              <img [src]="user?.image || 'assets/img/blank.png'" alt="Avatar" />
            </div>
            <div class="header-info">
              <strong>{{ user?.first_name }} {{ user?.last_name }}</strong>
              <small>{{ user?.email }}</small>
            </div>
          </li>
          <li>
            <hr class="dropdown-divider" />
          </li>
          <!-- <li>
            <a class="dropdown-item" routerLink="/dash/profile">
              <i class="bi bi-person"></i>
              <span>My Profile</span>
            </a>
          </li>
          <li>
            <a class="dropdown-item" routerLink="/dash/settings">
              <i class="bi bi-gear"></i>
              <span>Settings</span>
            </a>
          </li> -->
          <li>
            <hr class="dropdown-divider" />
          </li>
          <li>
            <a class="dropdown-item logout-item" (click)="logout()">
              <i class="bi bi-box-arrow-right"></i>
              <span>Logout</span>
            </a>
          </li>
        </ul>
      </div>
    </div>
</header>
<!-- 🔹 End Header -->
