    <i class="toggle-icon" [ngClass]="isCollapsed ? 'fe fe-menu' : 'fe fe-chevron-left'" (click)="toggleSidebar()">
    </i>
  </div>

  <ul class="nav flex-column">
    <li *ngFor="let item of menu" class="nav-item mx-3 my-2"
      [ngClass]="{ 'has-children': item.children, open: item.open }">
      <a class="nav-link" [routerLink]="item.children ? null : item.route" routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }" (click)="handleClick(item)"
        [ngClass]="{ toggleable: item.children }">
        <div class="nav-content">
          <lucide-icon [name]="item.icon"></lucide-icon>
          <span *ngIf="!isCollapsed">{{ item.label }}</span>
          <!-- إظهار عدد رسائل الاتصال غير المقروئة -->
          <span *ngIf="isContactMessagesItem(item) && unreadContactMessagesCount > 0 && !isCollapsed"
            class="badge bg-danger text-white ms-2 rounded-pill">
            {{ unreadContactMessagesCount }}
          </span>
          <!-- إظهار عدد الطلبات غير المقروءة -->
          <span *ngIf="isOrdersItem(item) && unreadOrdersCount > 0 && !isCollapsed"
            class="badge bg-danger text-white ms-2 rounded-pill">
            {{ unreadOrdersCount }}
          </span>
        </div>
        <i *ngIf="item.children && !isCollapsed" class="fe chevron" [ngClass]="{
            'fe-chevron-down': !item.open,
            'fe-chevron-up': item.open
          }"></i>
      </a>

      <ul class="nav sub-menu" *ngIf="item.children">
        <li *ngFor="let sub of item.children" class="nav-item">
          <a class="nav-link" [routerLink]="sub.route" routerLinkActive="active" #rla="routerLinkActive"
            [ngClass]="{ active: rla.isActive }">
            {{ sub.label }}
          </a>
        </li>
      </ul>
    </li>
  </ul>

  <div class="sidebar-footer mt-2 text-center">
    <!-- عرض الصورة بدون رابط -->
    <div style="display: inline-block">
      <img [src]="user?.image || user?.avatar || 'assets/img/blank.png'" alt="User" class="rounded-circle border"
        style="width: 45px; height: 45px" />
    </div>
    <!-- إظهار الاسم فقط إذا لم يكن مضغوط -->
    <div *ngIf="!isCollapsed" class="d-block mt-2 text-white">{{ user?.name }}</div>

    <!-- زر تسجيل الخروج دائمًا ظاهر -->
    <button class="logout-btn d-inline-flex align-items-center justify-content-center mt-2" (click)="logout()"
      [ngClass]="{ 'w-100': !isCollapsed }">
      <i class="fe fe-log-out" [ngClass]="{ 'me-1': !isCollapsed }"></i>
      <span *ngIf="!isCollapsed">Logout</span>
    </button>
  </div>
