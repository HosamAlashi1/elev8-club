    <!-- 🔸 Left: Logo with Glow -->

        <div class="logo-wrapper">
          <img src="assets/img/landing/logo.svg" alt="Dorrance" class="brand-logo" />
          <div class="logo-glow"></div>
        </div>
      </a>
    </div>

    <!-- 🔸 Center: Premium Pill Tabs -->

    <!-- 🔸 Right: User Profile -->
    <div class="user-section">
      <!-- 🔔 Notifications -->
      <div class="notification-wrapper" *ngIf="isLoggedIn">
        <button class="notification-btn" (click)="toggleNotifications($event)">
          <i class="bi bi-bell"></i>
          <span class="notification-badge" *ngIf="(unreadCount$ | async) as count" [class.zero]="count === 0">
            {{ count > 99 ? '99+' : count }}
          </span>
        </button>
      </div>

      <div class="dropdown">
        <button class="user-profile-btn" id="userDropdown" data-bs-toggle="dropdown" aria-expanded="false">
          <div class="avatar-wrapper">
            <img [src]="user?.image || 'assets/img/blank.png'" alt="User Avatar" class="user-avatar" />
            <div class="avatar-ring"></div>
          </div>
          <div class="user-info">
            <span class="user-name">{{ user?.first_name }} {{ user?.last_name }}</span>
            <span class="user-role">{{ getUserRoleLabel() }}</span>
          </div>
          <i class="bi bi-chevron-down dropdown-arrow"></i>
        </button>

        <ul class="dropdown-menu dropdown-menu-custom" aria-labelledby="userDropdown">
          <li class="dropdown-header">
            <div class="header-avatar">
              <img [src]="user?.image || 'assets/img/blank.png'" alt="Avatar" />
            </div>
            <div class="header-info">
              <strong>{{ user?.first_name }} {{ user?.last_name }}</strong>
              <small>{{ user?.email }}</small>
            </div>
          </li>
          <li>
            <hr class="dropdown-divider" />
          </li>
          <li>
            <a class="dropdown-item" routerLink="/profile">
              <i class="bi bi-person"></i>
              <span>My Profile</span>
            </a>
          </li>
          <li>
            <a class="dropdown-item" routerLink="/settings">
              <i class="bi bi-gear"></i>
              <span>Settings</span>
            </a>
          </li>
          <li>
            <hr class="dropdown-divider" />
          </li>
          <li>
            <a class="dropdown-item logout-item" (click)="logout()">
              <i class="bi bi-box-arrow-right"></i>
              <span>Logout</span>
            </a>
          </li>
        </ul>
      </div>
    </div>

  </div>
</header>
<!-- 🔹 End Header -->
   <app-notifications-drawer [isOpen]="isNotificationsOpen" [context]="'user'" (close)="isNotificationsOpen = false">
