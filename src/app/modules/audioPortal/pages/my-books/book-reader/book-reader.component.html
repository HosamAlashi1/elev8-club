<div class="book-reader-container" [class]="'theme-' + settings.theme">


  <!-- Main Reader Area -->
  <div class="reader-main">

    <!-- Chapters Sidebar -->
    <aside class="chapters-sidebar" [class.open]="showChaptersSidebar">
      <div class="sidebar-header">
        <div class="book-title-display" *ngIf="book">
          {{ book.title }}
        </div>
      </div>
      <ul class="chapters-list">
        <li *ngFor="let ch of chapters; trackBy: trackById" class="chapter-item"
          [class.active]="ch.id === selectedChapterId" (click)="goToChapter(ch.id)">
          {{ ch.title }}
        </li>
      </ul>
    </aside>

    <!-- Book Spread Container -->
    <div class="book-spread-container">

      <!-- Loading Overlay -->
      <div class="loading-overlay" *ngIf="isLoading">
        <div class="loading">📖 Loading book...</div>
      </div>

      <!-- Book Spread -->
      <div class="book-spread" *ngIf="!isLoading && pages?.length" [class.flipping]="isFlipping"
        [style.font-size.px]="settings.fontSize" [style.line-height]="settings.lineHeight">

        <!-- Framed book with inner shadow/gutter -->
        <div class="book-frame" #frameRef [class.flipping]="isFlipping"
          [class.flip-right]="isFlipping && lastDir==='right'" [class.flip-left]="isFlipping && lastDir==='left'">

          <app-book-flip [pages]="pageEls" [width]="920" [height]="1300" [soundEnabled]="settings.audioEnabled"
            (flipStart)="onFlipStart()" (flipComplete)="onFlipComplete()"
            (spreadChange)="onSpreadChange($event.left, $event.total)" (pageChange)="onPageChange($event)">
          </app-book-flip>

          <div class="page-curl" aria-hidden="true"></div>
          <div class="edge-count left" aria-hidden="true"></div>
          <div class="edge-count right" aria-hidden="true"></div>
          <div class="book-gutter-shadow" aria-hidden="true"></div>
        </div>

      </div>

      <!-- Navigation Controls -->
      <div class="navigation-controls" *ngIf="!isLoading && pages?.length">
        <button class="nav-btn" (click)="prevPage()" [disabled]="currentPage <= 1" aria-label="Previous page">
          ◄
        </button>

        <div class="nav-info">
          {{ currentPage }} / {{ totalPages }}
        </div>

        <button class="nav-btn" (click)="nextPage()" [disabled]="currentPage >= totalPages" aria-label="Next page">
          ►
        </button>
      </div>

    </div>
  </div>

</div>
