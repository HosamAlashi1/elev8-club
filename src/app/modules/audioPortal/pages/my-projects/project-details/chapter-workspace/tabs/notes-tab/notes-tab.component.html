<!-- ========================================
     📌 Notes Tab - Chat Style Layout
     ======================================== -->

<div class="notes-chat-container">
  
  <!-- ========================================
       🔹 Messages Area (Scrollable)
       ======================================== -->
  <div class="messages-area">
    
    <!-- Loading State -->
    <div *ngIf="isLoading" class="loading-state">
      <div class="skeleton-message" *ngFor="let i of [1,2,3]"></div>
    </div>

    <!-- Empty State -->
    <div *ngIf="!isLoading && notes.length === 0" class="empty-state">
      <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
      </svg>
      <p>No notes yet</p>
      <small>Start adding your first note below</small>
    </div>

    <!-- Messages List (Chat Bubbles) -->
    <div class="messages-list" *ngIf="!isLoading && notes.length > 0">
      <app-note-item
        *ngFor="let note of notes; trackBy: trackByNoteId"
        [note]="note"
        [chapterId]="chapterId"
        (edited)="onNoteEdited($event)"
        (deleted)="onNoteDeleted($event)">
      </app-note-item>
    </div>

  </div>

  <!-- ========================================
       🔹 Composer (Add New Note)
       ======================================== -->
  <div class="composer-section">
    <textarea 
      class="form-control composer-input"
      [(ngModel)]="newNoteText"
      (keydown)="onComposerKeydown($event)"
      placeholder="Type a note... (Ctrl+Enter to send)"
      rows="2"></textarea>
    
    <button 
      class="btn-send"
      (click)="submitNewNote()"
      [disabled]="!newNoteText.trim() || isSubmittingNew"
      aria-label="Send note">
      <span *ngIf="!isSubmittingNew">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </span>
      <span *ngIf="isSubmittingNew">
        <span class="spinner-border spinner-border-sm"></span>
      </span>
    </button>
  </div>

</div>
