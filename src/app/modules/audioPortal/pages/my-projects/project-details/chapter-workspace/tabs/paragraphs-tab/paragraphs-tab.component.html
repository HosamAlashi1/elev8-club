<!-- ========================================
     📝 Paragraphs Tab - No Pagination (up to 100 items)
     ======================================== -->

<div class="paragraphs-tab-container">

  <!-- ========================================
       🔹 Toolbar
       ======================================== -->
  <div class="toolbar" style="margin-top: 0.85rem !important;">

    <!-- Search مخفي أثناء الري أوردر -->
    <div class="search-box" *ngIf="!isReorderMode">
      <i class="feather icon-search"></i>
      <input type="text" class="form-control" placeholder="Search paragraphs..." [(ngModel)]="searchQuery"
        (input)="onSearchInput($event)" aria-label="Search paragraphs">
    </div>

    <!-- Actions -->
    <div class="toolbar-actions" *ngIf="!isReorderMode">
      <button class="btn-add-new" (click)="toggleComposer()" [disabled]="isLoading" *ngIf="!showComposer">
        <!-- أيقونة + -->
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff"
          stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon-paragraph">
          <rect x="3" y="3" width="14" height="16" rx="2" ry="2"></rect>
          <line x1="6" y1="8" x2="13" y2="8"></line>
          <line x1="6" y1="11" x2="11" y2="11"></line>
          <line x1="6" y1="14" x2="9" y2="14"></line>
          <circle cx="18" cy="18" r="3.5"></circle>
          <line x1="18" y1="16.5" x2="18" y2="19.5"></line>
          <line x1="16.5" y1="18" x2="19.5" y2="18"></line>
        </svg>
        <span>New Paragraph</span>
      </button>

      <button class="btn-reorder" (click)="toggleReorderMode()" [disabled]="isLoading || !paragraphs.length"
        title="Reorder paragraphs">
        <i class="bi bi-arrow-down-up"></i>
        <span>Reorder</span>
      </button>
    </div>

    <!-- Reorder buttons -->
    <div class="reorder-actions" *ngIf="isReorderMode" @fadeSlide>
      <div class="reorder-hint">
        <i class="bi bi-lightbulb"></i>
        <span>Drag paragraphs to change order, then click <strong>Save</strong>.</span>
      </div>

      <div class="reorder-buttons">
        <button class="btn-reorder-action btn-cancel" (click)="cancelReorderMode()" [disabled]="isSavingOrder">
          <i class="bi bi-x-lg"></i>
          <span>Cancel</span>
        </button>

        <button class="btn-reorder-action btn-save" (click)="saveOrder()" [disabled]="isSavingOrder || !isOrderDirty">
          <span class="spinner-border spinner-border-sm" *ngIf="isSavingOrder"></span>
          <i class="bi bi-check-lg" *ngIf="!isSavingOrder"></i>
          <span>{{ isSavingOrder ? 'Saving...' : 'Save' }}</span>
        </button>
      </div>
    </div>

  </div>

  <!-- ========================================
       🔹 Add Paragraph Composer
       ======================================== -->
  <div class="composer-container" *ngIf="showComposer && !isReorderMode">
    <div class="composer-card">
      <div class="composer-header">
        <div class="composer-title">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none"
            stroke="#5bbdb7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon-paragraph">
            <rect x="3" y="3" width="14" height="16" rx="2" ry="2"></rect>
            <line x1="6" y1="8" x2="13" y2="8"></line>
            <line x1="6" y1="11" x2="11" y2="11"></line>
            <line x1="6" y1="14" x2="9" y2="14"></line>
            <circle cx="18" cy="18" r="3.5"></circle>
            <line x1="18" y1="16.5" x2="18" y2="19.5"></line>
            <line x1="16.5" y1="18" x2="19.5" y2="18"></line>
          </svg>
          <h6>New Paragraph</h6>
        </div>
        <button class="btn-close-composer" (click)="toggleComposer()" aria-label="Close">
          <i class="feather icon-x"></i>
        </button>
      </div>

      <textarea class="form-control composer-textarea" [(ngModel)]="newParagraphText"
        (keydown)="onComposerKeydown($event)" placeholder="Write paragraph here... (Ctrl+Enter to save)"
        rows="4"></textarea>

      <div class="composer-footer">
        <div class="composer-actions">
          <button class="btn btn-sm btn-secondary" (click)="toggleComposer()">
            <i class="feather icon-x"></i>
            Cancel
          </button>
          <button class="btn btn-sm btn-add-new" (click)="submitNewParagraph()"
            [disabled]="!newParagraphText.trim() || isSubmittingNew">
            <span *ngIf="!isSubmittingNew">
              <i class="feather icon-check"></i>
              Save
            </span>
            <span *ngIf="isSubmittingNew">
              <span class="spinner-border spinner-border-sm me-2"></span>
              Saving...
            </span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- ========================================
       🔹 List
       ======================================== -->
  <div class="content-layout">
    <div class="paragraphs-list-container" #listContainer>
      <!-- Loading -->
      <div *ngIf="isLoading" class="loading-state">
        <div class="skeleton-paragraph" *ngFor="let i of [1,2,3,4,5]"></div>
      </div>

      <!-- Empty -->
      <div *ngIf="!isLoading && filteredParagraphs.length === 0 && !isReorderMode" class="empty-state">
        <i class="feather icon-file-text"></i>
        <p *ngIf="!searchQuery">No paragraphs in this chapter</p>
        <p *ngIf="searchQuery">No results for "{{ searchQuery }}"</p>
      </div>

      <div class="paragraphs-list" *ngIf="!isLoading && !isReorderMode && filteredParagraphs.length > 0">
        <app-paragraph-item *ngFor="let paragraph of filteredParagraphs; trackBy: trackByParagraphId"
          [paragraph]="paragraph" [chapterId]="chapterId" [authType]="authType"
          [isProjectGenerating]="isProjectGenerating" [isChapterGenerating]="isChapterGenerating" [reorderMode]="false"
          [id]="'paragraph-' + paragraph.id" [attr.data-paragraph-id]="paragraph.id"
          (edited)="onParagraphEdited($event)" (deleted)="onParagraphDeleted($event)">
        </app-paragraph-item>

        <!-- ⛳ مرساة الانفينتي سكروول -->
        <div #infiniteAnchor class="infinite-anchor"></div>

        <!-- لودينغ بسيط عند جلب المزيد -->
        <div class="loading-more" *ngIf="loadingMore">
          <span class="spinner-border spinner-border-sm"></span>
          <span class="ms-2">Loading more…</span>
        </div>
      </div>

      <!-- Reorder Mode List (بدون انفينتي) -->
      <div class="paragraphs-list" *ngIf="!isLoading && isReorderMode" cdkDropList
        (cdkDropListDropped)="onDrop($event)">

        <!-- <div class="reorder-info-banner">
          <i class="bi bi-lightbulb"></i>
          <span>Drag paragraphs to change their order. Click <strong>Save</strong> when done.</span>
        </div> -->

        <div class="paragraph-row reorderable paragraph-card"  [style.animationDelay]="(i * 0.05) + 's'" *ngFor="let p of paragraphs; let i = index; trackBy: trackByParagraphId"
          cdkDrag>

          <div class="order-badge">{{ i + 1 }}</div>
          <div class="drag-handle" cdkDragHandle>
            <i class="bi bi-grip-vertical"></i>
          </div>

          <!-- نعرض العنصر بدون الأكشنات (reorderMode = true) -->
          <app-paragraph-item [paragraph]="p" [chapterId]="chapterId" [authType]="authType"
            [isProjectGenerating]="isProjectGenerating" [isChapterGenerating]="isChapterGenerating"
            [reorderMode]="true">
          </app-paragraph-item>
        </div>
      </div>

    </div>
  </div>

</div>
