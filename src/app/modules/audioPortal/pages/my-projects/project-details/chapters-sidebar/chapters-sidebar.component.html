<!-- ========================================
     📚 Chapters Sidebar
     ======================================== -->
<div class="sidebar-container">
  
  <!-- ========================================
       🔹 Toolbar
       ======================================== -->
  <div class="sidebar-toolbar">
    <!-- Search (Hidden in Reorder Mode) -->
    <div class="search-box" *ngIf="!isReorderMode">
      <i class="bi bi-search"></i>
      <input 
        type="text" 
        class="form-control" 
        placeholder="Search chapters..."
        [(ngModel)]="searchTerm"
        (ngModelChange)="onSearchChange()"
      />
    </div>

    <!-- Normal Mode Actions -->
    <div class="toolbar-actions" *ngIf="!isReorderMode">
      <!-- Add Chapter Button -->
      <button 
        class="btn-toolbar-action btn-add"
        (click)="startAddingChapter()"
        [disabled]="isAddingChapter"
        title="Add New Chapter"
      >
        <i class="bi bi-plus-circle"></i>
      </button>

      <!-- Reorder Button -->
      <button 
        class="btn-toolbar-action btn-reorder"
        (click)="toggleReorderMode()"
        [disabled]="chapters.length === 0"
        title="Reorder Chapters"
      >
        <i class="bi bi-arrow-down-up"></i>
      </button>
    </div>

    <!-- Reorder Mode Actions -->
    <div class="reorder-mode-actions" *ngIf="isReorderMode" @slideFade>
      <!-- <div class="reorder-mode-info">
        <i class="bi bi-grip-vertical"></i>
        <span>Drag to reorder</span>
      </div> -->
      
      <div class="reorder-mode-buttons">
        <button 
          class="btn-reorder-action btn-cancel"
          (click)="cancelReorderMode()"
          [disabled]="isSavingOrder"
          title="Cancel and restore original order"
        >
          <i class="bi bi-x-lg"></i>
          <span>Cancel</span>
        </button>
        
        <button 
          class="btn-reorder-action btn-save"
          (click)="saveOrder()"
          [disabled]="isSavingOrder"
          title="Save new chapter order"
        >
          <span class="spinner-border spinner-border-sm" *ngIf="isSavingOrder"></span>
          <i class="bi bi-check-lg" *ngIf="!isSavingOrder"></i>
          <span>{{ isSavingOrder ? 'Saving...' : 'Save' }}</span>
        </button>
      </div>
    </div>
  </div>

  <!-- ========================================
       🔹 Add Chapter Composer
       ======================================== -->
  <div class="add-chapter-composer" *ngIf="isAddingChapter" @popIn>
    <input 
      type="text" 
      class="form-control add-chapter-input"
      placeholder="Chapter title..."
      [(ngModel)]="newChapterTitle"
      (keydown.enter)="submitAddChapter()"
      (keydown.escape)="cancelAddChapter()"
      [disabled]="isSubmitting"
    />
    <div class="composer-actions">
      <button 
        class="btn btn-sm btn-add-chapter"
        (click)="submitAddChapter()"
        [disabled]="!newChapterTitle.trim() || isSubmitting"
      >
        <span *ngIf="!isSubmitting">Add</span>
        <span *ngIf="isSubmitting" class="spinner-border spinner-border-sm"></span>
      </button>
      <button 
        class="btn btn-sm btn-secondary"
        (click)="cancelAddChapter()"
        [disabled]="isSubmitting"
      >
        Cancel
      </button>
    </div>
  </div>

  <!-- ========================================
       🔹 Chapters List
       ======================================== -->
  <div class="chapters-list" [class.reorder-mode]="isReorderMode">
    
    <!-- Loading Skeleton (Initial Load or Reload) -->
    <div *ngIf="isInitialLoading || isReloading" class="chapters-scroll">
      <div class="skeleton-item" *ngFor="let i of [1,2,3,4,5,6,7,8]"></div>
    </div>

    <!-- Normal Mode -->
    <div 
      *ngIf="!isReorderMode && !isReloading && !isInitialLoading"
      class="chapters-scroll"
    >
      <div 
        *ngFor="let chapter of filteredChapters; trackBy: trackByChapterId"
        class="chapter-item"
        [class.active]="chapter.id === selectedChapterId"
        (click)="selectChapter(chapter.id)"
      >
        <!-- Normal View -->
        <div class="chapter-content" *ngIf="renamingChapterId !== chapter.id">
          <div class="chapter-title" [ngbTooltip]="chapter.title">
            {{ chapter.title }}
          </div>
          <div class="chapter-actions">
            <button 
              class="btn-action"
              (click)="startRenaming(chapter, $event)"
              title="Rename"
            >
              <i class="bi bi-pencil"></i>
            </button>
            <button 
              class="btn-action btn-delete"
              (click)="deleteChapter(chapter, $event)"
              title="Delete"
            >
              <i class="bi bi-trash"></i>
            </button>
          </div>
        </div>

        <!-- Rename View -->
        <div class="chapter-rename" *ngIf="renamingChapterId === chapter.id">
          <input 
            type="text" 
            class="form-control rename-input"
            [(ngModel)]="renameTitle"
            (keydown.enter)="submitRename(chapter.id)"
            (keydown.escape)="cancelRename()"
            (click)="$event.stopPropagation()"
            [disabled]="isSubmitting"
          />
          <div class="rename-actions">
            <button 
              class="btn-action btn-save"
              (click)="submitRename(chapter.id); $event.stopPropagation()"
              [disabled]="!renameTitle.trim() || isSubmitting"
              title="Save"
            >
              <i class="bi bi-check-lg"></i>
            </button>
            <button 
              class="btn-action"
              (click)="cancelRename(); $event.stopPropagation()"
              [disabled]="isSubmitting"
              title="Cancel"
            >
              <i class="bi bi-x-lg"></i>
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Reorder Mode (Drag & Drop) -->
    <div 
      *ngIf="isReorderMode && !isReloading && !isInitialLoading"
      class="chapters-scroll"
      cdkDropList
      (cdkDropListDropped)="onDrop($event)"
    >
      <!-- Reorder Mode Info Banner -->
      <div class="reorder-info-banner">
        <i class="bi bi-lightbulb"></i>
        <span>Drag chapters to change their order. Click <strong>Save</strong> when done.</span>
      </div>

      <div 
        *ngFor="let chapter of chapters; let i = index; trackBy: trackByChapterId"
        class="chapter-item reorderable"
        cdkDrag
      >
        <div class="chapter-order-number">{{ i + 1 }}</div>
        <div class="drag-handle" cdkDragHandle>
          <i class="bi bi-grip-vertical"></i>
        </div>
        <div class="chapter-title" [title]="chapter.title">
          {{ chapter.title }}
        </div>
      </div>
    </div>

    <!-- Empty State -->
    <div class="empty-state" *ngIf="filteredChapters.length === 0 && !isAddingChapter && !isReloading && !isInitialLoading">
      <div class="empty-icon">📖</div>
      <p class="empty-text">
        {{ searchTerm ? 'No matching chapters' : 'No chapters yet' }}
      </p>
      <button 
        *ngIf="!searchTerm"
        class="btn btn-sm btn-outline-primary"
        (click)="startAddingChapter()"
      >
        <i class="bi bi-plus-circle me-1"></i>
        Add First Chapter
      </button>
    </div>

  </div>

</div>
