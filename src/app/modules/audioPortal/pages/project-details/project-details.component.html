<!-- ========================================
     📖 Project Details Page
     ======================================== -->
<div class="project-details-page" *ngIf="!(isLoadingProject$ | async) && project">

  <!-- ========================================
       🔹 Header
       ======================================== -->
  <header class="page-header">
    <div class="header-left">
      <button class="btn-back" (click)="goBack()" aria-label="Back to projects">
        <i class="bi bi-arrow-left"></i>
      </button>
      <div class="project-info">
        <h4 class="project-title">{{ project.name }}</h4>
        <p class="project-meta">{{ project.chapters.length }} Chapters</p>
      </div>
    </div>

    <div class="header-actions">
      <!-- Voice Button (Compact) - Visible Only for Editors -->
      <button 
        *ngIf="userAuthType === AuthType.Editor"
        class="btn btn-voice-project" [class.generating]="voiceState === 'generating'"
        [class.ready]="voiceState === 'ready'" [class.failed]="voiceState === 'failed'"
        [disabled]="!canGenerate || isGenerating || isAnyChildGenerating"
        (click)="voiceState === 'ready' ? playProjectVoice() : generateVoice()" [ngbTooltip]="getVoiceTooltip()">
        <!-- Idle -->
        <svg *ngIf="voiceState === 'idle'" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
          fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
          <line x1="12" y1="19" x2="12" y2="23"></line>
          <line x1="8" y1="23" x2="16" y2="23"></line>
        </svg>
        <!-- Generating -->
        <!-- Generating State: Audio Waves -->
        <span *ngIf="voiceState === 'generating'" class="audio-waves">
          <span class="wave"></span>
          <span class="wave"></span>
          <span class="wave"></span>
        </span>
        <!-- Ready -->
        <svg *ngIf="voiceState === 'ready'" xmlns="http://www.w3.org/2000/svg" width="16" height="16"
          viewBox="0 0 24 24" fill="currentColor">
          <polygon points="5 3 19 12 5 21 5 3"></polygon>
        </svg>
        <!-- Failed -->
        <svg *ngIf="voiceState === 'failed'" xmlns="http://www.w3.org/2000/svg" width="16" height="16"
          viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
          stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
        <span>
          <ng-container [ngSwitch]="voiceState">
            <span *ngSwitchCase="'idle'">Project Voice</span>
            <span *ngSwitchCase="'generating'">Generating...</span>
            <span *ngSwitchCase="'ready'">Play Voice</span>
            <span *ngSwitchCase="'failed'">Failed</span>
          </ng-container>
        </span>
      </button>

      <button class="btn btn-outline-secondary" [class.active]="isReorderMode" (click)="toggleReorderMode()">
        <i class="bi" [ngClass]="isReorderMode ? 'bi-check-circle' : 'bi-arrow-down-up'"></i>
        {{ isReorderMode ? 'Done Reordering' : 'Reorder Chapters' }}
      </button>
    </div>
  </header>

  <!-- ========================================
       ⚠️ Project Voice Error Banner (Only for Failed State & Editors)
       ======================================== -->
  <div *ngIf="userAuthType === AuthType.Editor && canGenerate && voiceState === 'failed'" class="project-error-banner">
    <div class="error-banner-content">
      <div class="error-banner-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"></circle>
          <line x1="12" y1="8" x2="12" y2="12"></line>
          <line x1="12" y1="16" x2="12.01" y2="16"></line>
        </svg>
      </div>
      <span class="error-banner-text">
        {{ project.process?.error_message || 'Failed to generate project voice' }}
      </span>
    </div>
  </div>

  <!-- ========================================
       🔹 Two-Pane Layout
       ======================================== -->
  <div class="layout-container">

    <!-- Left: Chapters Sidebar -->
    <aside class="chapters-sidebar">
      <app-chapters-sidebar [projectId]="projectId" [chapters]="project.chapters"
        [selectedChapterId]="selectedChapterId$ | async" [isReorderMode]="isReorderMode"
        [isInitialLoading]="!!(isLoadingProject$ | async)" (chapterSelected)="selectChapter($event)"
        (reloadRequested)="onReloadRequested()" (chapterRenamed)="onChapterRenamed($event)"
        (chaptersReordered)="onChaptersReordered($event)"></app-chapters-sidebar>
    </aside>

    <!-- Right: Chapter Workspace -->
    <main class="workspace-container">
      <app-chapter-workspace *ngIf="selectedChapterId$ | async as chapterId" 
        [chapterId]="chapterId"
        [projectId]="projectId" 
        [authType]="userAuthType" 
        [isProjectGenerating]="isGenerating"
        (chapterRenamed)="onChapterRenamed($event)"
        (chapterDeleted)="onChapterDeletedFromWorkspace($event)"></app-chapter-workspace>

      <!-- Empty State: No Chapter Selected -->
      <div class="workspace-empty" *ngIf="!(selectedChapterId$ | async)">
        <div class="empty-icon">📖</div>
        <h5>No Chapter Selected</h5>
        <p>Select a chapter from the sidebar to view its content</p>
      </div>
    </main>

  </div>

</div>



<!-- ========================================
     🔹 Error State
     ======================================== -->
<div class="error-container" *ngIf="errorMessage && !(isLoadingProject$ | async)">
  <div class="error-icon">⚠️</div>
  <h5>Failed to Load Project</h5>
  <p>{{ errorMessage }}</p>
  <button class="btn btn-primary" (click)="loadProjectDetails()">
    <i class="bi bi-arrow-clockwise me-2"></i>
    Try Again
  </button>
</div>
