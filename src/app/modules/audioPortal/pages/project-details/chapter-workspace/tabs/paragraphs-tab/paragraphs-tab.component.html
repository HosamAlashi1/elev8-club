<!-- ========================================
     📝 Paragraphs Tab - No Pagination (up to 100 items)
     ======================================== -->

<div class="paragraphs-tab-container">
  
  <!-- ========================================
       🔹 Toolbar (Search + Add Button)
       ======================================== -->
  <div class="toolbar">
    <div class="search-box">
      <i class="feather icon-search"></i>
      <input 
        type="text" 
        class="form-control" 
        placeholder="Search paragraphs..."
        [(ngModel)]="searchQuery"
        (input)="onSearchInput($event)"
        aria-label="Search paragraphs">
    </div>
    
    <button 
      class="btn-add-new"
      (click)="toggleComposer()"
      [disabled]="isLoading"
      *ngIf="!showComposer">
      <i class="feather icon-plus"></i>
      <span>New Paragraph</span>
    </button>
  </div>

  <!-- ========================================
       🔹 Add Paragraph Composer
       ======================================== -->
  <div class="composer-container" *ngIf="showComposer">
    <div class="composer-card">
      <div class="composer-header">
        <div class="composer-title">
          <i class="feather icon-edit-3"></i>
          <h6>New Paragraph</h6>
        </div>
        <button class="btn-close-composer" (click)="toggleComposer()" aria-label="Close">
          <i class="feather icon-x"></i>
        </button>
      </div>
      
      <textarea 
        class="form-control composer-textarea"
        [(ngModel)]="newParagraphText"
        (keydown)="onComposerKeydown($event)"
        placeholder="Write paragraph here... (Ctrl+Enter to save)"
        rows="4"></textarea>
      
      <div class="composer-footer">
        <div class="composer-actions">
          <button 
            class="btn btn-sm btn-secondary"
            (click)="toggleComposer()">
            <i class="feather icon-x"></i>
            Cancel
          </button>
          <button 
            class="btn btn-sm btn-add-new"
            (click)="submitNewParagraph()"
            [disabled]="!newParagraphText.trim() || isSubmittingNew">
            <span *ngIf="!isSubmittingNew">
              <i class="feather icon-check"></i>
              Save
            </span>
            <span *ngIf="isSubmittingNew">
              <span class="spinner-border spinner-border-sm me-2"></span>
              Saving...
            </span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- ========================================
       🔹 Layout: TOC + Paragraphs List
       ======================================== -->
  <div class="content-layout">


    <!-- Paragraphs List -->
    <div class="paragraphs-list-container">
      
      <!-- Loading State -->
      <div *ngIf="isLoading" class="loading-state">
        <div class="skeleton-paragraph" *ngFor="let i of [1,2,3,4,5]"></div>
      </div>

      <!-- Empty State -->
      <div *ngIf="!isLoading && filteredParagraphs.length === 0" class="empty-state">
        <i class="feather icon-file-text"></i>
        <p *ngIf="!searchQuery">No paragraphs in this chapter</p>
        <p *ngIf="searchQuery">No results for "{{ searchQuery }}"</p>
      </div>

      <!-- Paragraphs Items -->
      <div class="paragraphs-list" *ngIf="!isLoading && filteredParagraphs.length > 0">
        <app-paragraph-item
          *ngFor="let paragraph of filteredParagraphs; trackBy: trackByParagraphId"
          [paragraph]="paragraph"
          [chapterId]="chapterId"
          [authType]="authType"
          [isProjectGenerating]="isProjectGenerating"
          [isChapterGenerating]="isChapterGenerating"
          [id]="'paragraph-' + paragraph.id"
          [attr.data-paragraph-id]="paragraph.id"
          (edited)="onParagraphEdited($event)"
          (deleted)="onParagraphDeleted($event)">
        </app-paragraph-item>
      </div>

    </div>
  </div>

</div>
