  <!-- ========================================
       🎙️ Chapter Voice - Glass Card (Clean & Premium) - Visible Only for Editors
       ======================================== -->
  <div class="chapter-voice-card" *ngIf="authType === AuthType.Editor">
    
    <!-- Idle State: Generate Button - Always Visible -->
    <button 
      *ngIf="voiceState === 'idle'"
      class="btn-generate-voice"
      [disabled]="!canGenerate || isProjectGenerating || isAnyParagraphGenerating"
      (click)="generateVoice()"
      [title]="getVoiceTooltip()">
      
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
        <line x1="12" y1="19" x2="12" y2="23"></line>
        <line x1="8" y1="23" x2="16" y2="23"></line>
      </svg>
      <span>Generate Chapter Voice</span>
    </button>

    <!-- Generating State: Loading with Spinner -->
    <div *ngIf="voiceState === 'generating'" class="voice-generating">
      <div class="btn-loading">
        <div class="spinner"></div>
      </div>
      <span class="generating-text">Generating Chapter Voice...</span>
    </div>

    <!-- Ready State: Glass Card Player -->
    <div *ngIf="voiceState === 'ready' && chapter?.voice_url" class="glass-player">
      <div class="player-header">
        <span class="audio-title">Chapter Voice</span>
        <span class="time-meta">{{ formatTime(currentTime) }} / {{ formatTime(duration) }}</span>
      </div>

      <!-- Play/Pause Button -->
      <button 
        class="btn-play"
        (click)="togglePlayPause()"
        [attr.aria-label]="isPlaying ? 'Pause' : 'Play'">
        
        <!-- Play Icon -->
        <svg *ngIf="!isPlaying" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
          <polygon points="5 3 19 12 5 21 5 3"></polygon>
        </svg>
        
        <!-- Pause Icon -->
        <svg *ngIf="isPlaying" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
          <rect x="6" y="4" width="4" height="16"></rect>
          <rect x="14" y="4" width="4" height="16"></rect>
        </svg>
      </button>

      <!-- Progress Bar (Simple - no WaveSurfer for now) -->
      <div class="wave-container" [class.is-playing]="isPlaying">
        <div class="simple-progress-track">
          <div class="simple-progress-fill" [style.width.%]="audioProgress"></div>
        </div>
      </div>

      <!-- Hidden Audio Element -->
      <audio 
        #chapterAudio
        [src]="chapter.voice_url"
        (timeupdate)="onTimeUpdate($event)"
        (loadedmetadata)="onMetadataLoaded($event)"
        (ended)="onAudioEnded()"
        preload="metadata">
      </audio>

      <!-- Accessibility: Live Region -->
      <div class="sr-only" aria-live="polite" aria-atomic="true">
        {{ isPlaying ? 'Playing' : 'Paused' }}: Chapter Voice
      </div>
    </div>

    <!-- Failed State: Error Chip -->
    <div *ngIf="voiceState === 'failed'" class="voice-failed">
      <div class="audio-error">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"></circle>
          <line x1="12" y1="8" x2="12" y2="12"></line>
          <line x1="12" y1="16" x2="12.01" y2="16"></line>
        </svg>
        <span>{{ chapter.process?.error_message || 'Failed' }}</span>
      </div>
    </div>
  </div>

  <!-- ========================================
       🔹 Split Content Layout (Paragraphs + Notes)
       ======================================== -->
  <div class="split-content-layout">
    
    <!-- Left Side: Paragraphs -->
    <div class="content-main">
      <app-paragraphs-tab 
        [chapterId]="chapterId"
        [authType]="authType"
        [isProjectGenerating]="isProjectGenerating"
        [isChapterGenerating]="isGenerating">
      </app-paragraphs-tab>
    </div>

    <!-- Right Side: Notes Chat -->
    <div class="notes-sidebar" [class.mobile-visible]="notesVisible">
      <div class="notes-sidebar-header">
        <div class="notes-header-title">
          <i class="bi bi-chat-dots"></i>
          <h6>Discussion</h6>
        </div>
        <button 
          class="btn-close-sidebar d-lg-none"
          (click)="toggleNotesSidebar()">
          <i class="bi bi-x-lg"></i>
        </button>
      </div>
      
      <app-notes-tab 
        [chapterId]="chapterId">
      </app-notes-tab>
    </div>

  </div>

</div>
