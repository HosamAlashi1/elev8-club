<!-- ========================================
     🎧 Mini Audio Dock (Fixed Bottom)
     Appears only while playing any audio
     ======================================== -->
<div class="audio-dock" *ngIf="isVisible" [@slideUp]>
  
  <!-- Left: Cover Avatar -->
  <div class="dock-cover">
    <div class="cover-letter">{{ getCoverLetter() }}</div>
  </div>

  <!-- Center: Track Info -->
  <div class="dock-info">
    <div class="dock-title">{{ getTrackTitle() }}</div>
    <div class="dock-time">{{ getTimeDisplay() }}</div>
  </div>

  <!-- Right: Controls -->
  <div class="dock-controls">
    
    <!-- Play/Pause Button -->
    <button 
      class="btn-dock-play"
      (click)="togglePlayPause()"
      [attr.aria-label]="playbackState.isPlaying ? 'Pause' : 'Play'"
      [title]="playbackState.isPlaying ? 'Pause' : 'Play'">
      
      <!-- Play Icon -->
      <svg *ngIf="!playbackState.isPlaying" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
        <polygon points="5 3 19 12 5 21 5 3"></polygon>
      </svg>
      
      <!-- Pause Icon -->
      <svg *ngIf="playbackState.isPlaying" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
        <rect x="6" y="4" width="4" height="16"></rect>
        <rect x="14" y="4" width="4" height="16"></rect>
      </svg>
    </button>

    <!-- Mute/Unmute Button -->
    <button 
      class="btn-dock-mute"
      (click)="toggleMute()"
      [attr.aria-label]="isMuted ? 'Unmute' : 'Mute'"
      [title]="isMuted ? 'Unmute' : 'Mute'">
      
      <!-- Volume On -->
      <svg *ngIf="!isMuted" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
        <path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>
        <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
      </svg>
      
      <!-- Volume Muted -->
      <svg *ngIf="isMuted" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
        <line x1="23" y1="9" x2="17" y2="15"></line>
        <line x1="17" y1="9" x2="23" y2="15"></line>
      </svg>
    </button>

    <!-- Volume Slider -->
    <div class="dock-volume">
      <input 
        type="range" 
        min="0" 
        max="1" 
        step="0.01"
        [value]="volume"
        (input)="onVolumeChange($event)"
        class="volume-slider"
        aria-label="Volume"
        title="Volume">
    </div>
  </div>

  <!-- Accessibility: Live Region for Screen Readers -->
  <div class="sr-only" aria-live="polite" aria-atomic="true">
    {{ playbackState.isPlaying ? 'Playing' : 'Paused' }}: {{ getTrackTitle() }}
  </div>
</div>
