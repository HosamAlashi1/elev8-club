<!-- 🌟 Topbar -->
<div class="topbar fixed-top d-none d-lg-block mb-5" data-aos="fade-left" data-aos-duration="600">
  <div
    class="container-fluid px-3 px-md-4 px-xl-5 d-flex flex-column flex-md-row justify-content-between align-items-center gap-lg-2">

    <!-- 📞 Contact -->
    <div class="contact small text-center text-md-start" data-aos="fade-right" data-aos-delay="100">
      <span class="me-md-3 d-block d-md-inline">Contact: {{ phone }}</span>
      <span class="d-block d-md-inline">{{ email }}</span>
    </div>

    <!-- 🌐 Socials -->
    <div class="socials text-center text-md-end" data-aos="fade-left" data-aos-delay="200">
      <a *ngIf="socials.facebook" [href]="socials.facebook" target="_blank"><i class="fa-brands fa-facebook-f"></i></a>
      <a *ngIf="socials.twitter" [href]="socials.twitter" target="_blank"><i class="fa-brands fa-x-twitter"></i></a>
      <a *ngIf="socials.instagram" [href]="socials.instagram" target="_blank"><i class="fa-brands fa-instagram"></i></a>
      <a *ngIf="socials.pinterest" [href]="socials.pinterest" target="_blank"><i class="fa-brands fa-pinterest-p"></i></a>
      <a *ngIf="socials.youtube" [href]="socials.youtube" target="_blank"><i class="fa-brands fa-youtube"></i></a>
      <a *ngIf="socials.tiktok" [href]="socials.tiktok" target="_blank"><i class="fa-brands fa-tiktok"></i></a>
    </div>
  </div>
</div>

<!-- 🧭 Main Navbar -->
<nav class="navbar navbar-expand-lg bg-white border-bottom lp-navbar with-topbar" [class.scrolled]="scrolled"
  data-aos="fade-down" data-aos-duration="700">
  <div class="w-100 d-flex justify-content-between align-items-center px-3 px-md-4 px-xl-5">

    <!-- 🏷️ Brand -->
    <a class="navbar-brand d-flex align-items-center me-2" [routerLink]="['/']">
      <img src="assets/img/landing/logo.svg" alt="Logo" class="logo">
    </a>

    <!-- 📱 Toggler -->
    <button class="navbar-toggler ms-auto d-lg-none" type="button" (click)="isCollapsed = !isCollapsed">
      <span class="navbar-toggler-icon"></span>
    </button>

    <!-- 🧩 Links (Desktop) -->
    <div class="collapse navbar-collapse d-none d-lg-flex" id="lpNavbar">
      <ul class="navbar-nav mx-lg-auto gap-lg-3 lp-navbar-links">
        <li class="nav-item" *ngFor="let link of navLinks; let i = index">
          <a class="nav-link text-decoration-none" [class.active]="isActive(link)" href=""
            (click)="handleLinkClick(link, $event)">
            {{ link.label }}
          </a>
        </li>
      </ul>
    </div>

    <!-- ⚙️ Actions (Desktop) -->
    <div class="d-none d-lg-flex align-items-center gap-3 lp-actions">
      <a class="icon-btn" [routerLink]="['/search']"><i class="fa-solid fa-magnifying-glass"></i></a>

      <!-- غير مسجّل -->
      <a *ngIf="!isLoggedIn" href (click)="openAccountModal('login', $event)" class="icon-btn">
        <i class="fa-solid fa-user"></i>
      </a>

      <!-- مسجّل -->
      <div *ngIf="isLoggedIn" ngbDropdown class="dropdown">
        <button class="avatar-btn" ngbDropdownToggle>
          <div class="avatar-ring">
            <img *ngIf="user?.image" [src]="user.image" alt="User Avatar" class="avatar-img">
            <div *ngIf="!user?.image" class="avatar-placeholder">
              {{ user?.first_name?.charAt(0) }}{{ user?.last_name?.charAt(0) }}
            </div>
            <i class="fa-solid fa-chevron-down avatar-caret"></i>
          </div>
        </button>

        <!-- Dropdown -->
        <div ngbDropdownMenu class="user-dropdown-menu dropdown-menu-end">
          <div class="dropdown-header d-flex align-items-center gap-2 px-3 py-2">
            <img *ngIf="user?.image" [src]="user.image" alt="avatar" class="rounded-circle" width="36" height="36">
            <div>
              <strong>{{ user?.first_name }} {{ user?.last_name }}</strong><br>
              <small class="text-muted">{{ user?.email }}</small>
            </div>
          </div>
          <hr class="my-1">
          <a class="dropdown-item" (click)="navigateIfLogged('books')">
            <i class="fa-solid fa-book-open me-2 text-secondary"></i> My Books
          </a>
          <a class="dropdown-item" (click)="navigateIfLogged('settings')">
            <i class="fa-solid fa-gear me-2 text-secondary"></i> Settings
          </a>
          <div class="dropdown-divider"></div>
          <a class="dropdown-item text-danger" (click)="logout()">
            <i class="fa-solid fa-right-from-bracket me-2"></i> Logout
          </a>
        </div>
      </div>

      <!-- 🛒 Cart -->
      <a class="icon-btn cart-icon position-relative" href (click)="navigateIfLogged('cart', $event)">
        <i class="fa-solid fa-cart-shopping"></i>
        <span *ngIf="cartCount > 0" class="cart-badge" [class.bump]="bumpAnim">{{ cartCount }}</span>
      </a>
    </div>
  </div>

  <!-- 📱 Mobile Menu -->
  <div class="mobile-menu d-lg-none" [class.open]="!isCollapsed">
    <button class="btn-close ms-auto mb-4" aria-label="Close" (click)="isCollapsed = true"></button>

    <!-- Links -->
    <ul class="navbar-nav flex-column text-center w-100">
      <li class="nav-item" *ngFor="let link of navLinks; let i = index">
        <a class="nav-link" [class.active]="isActive(link)" (click)="handleLinkClick(link, $event)">
          {{ link.label }}
        </a>
      </li>
    </ul>

    <!-- Actions -->
    <div class="mt-3 d-flex justify-content-center gap-4">
      <a class="text-dark" [routerLink]="['/search']"><i class="fa-solid fa-magnifying-glass"></i></a>

      <!-- غير مسجل -->
      <a *ngIf="!isLoggedIn" href (click)="openAccountModal('login', $event)" class="text-dark">
        <i class="fa-solid fa-user"></i>
      </a>

      <!-- مسجل -->
      <div *ngIf="isLoggedIn" ngbDropdown class="dropdown">
        <button class="avatar-btn" ngbDropdownToggle>
          <div class="avatar-ring">
            <img *ngIf="user?.image" [src]="user.image" alt="User Avatar" class="avatar-img">
            <div *ngIf="!user?.image" class="avatar-placeholder">
              {{ user?.first_name?.charAt(0) }}{{ user?.last_name?.charAt(0) }}
            </div>
            <i class="fa-solid fa-chevron-down avatar-caret"></i>
          </div>
        </button>
        <div ngbDropdownMenu class="user-dropdown-menu dropdown-menu-end">
          <a class="dropdown-item" (click)="navigateIfLogged('books')">My Books</a>
          <a class="dropdown-item text-danger" (click)="logout()">Logout</a>
        </div>
      </div>

      <!-- Cart -->
      <div class="cart-icon-wrapper" [class.bump]="bumpAnim">
        <a class="text-dark position-relative" href (click)="navigateIfLogged('cart', $event)">
          <i class="fa-solid fa-cart-shopping"></i>
          <span class="cart-badge" *ngIf="cartCount > 0">{{ cartCount }}</span>
        </a>
      </div>
    </div>

    <!-- 🌐 Socials -->
    <div class="mt-4 d-flex justify-content-center gap-3 social-mobile">
      <a *ngIf="socials.facebook" [href]="socials.facebook" target="_blank"><i class="fa-brands fa-facebook-f"></i></a>
      <a *ngIf="socials.twitter" [href]="socials.twitter" target="_blank"><i class="fa-brands fa-x-twitter"></i></a>
      <a *ngIf="socials.instagram" [href]="socials.instagram" target="_blank"><i class="fa-brands fa-instagram"></i></a>
    </div>
  </div>
</nav>
