<div class="become-author-page animate-route">

  <!-- Hero Section -->
  <section class="lp-section hero" data-aos="fade-up">
    <app-become-author-hero
      [title]="settings.hero_title"
      [subtitle]="settings.hero_desc"
      [buttonLink]="settings.hero_button_link"
      [buttonText]="settings.hero_button_text"
      [background]="pre.hero.background">
    </app-become-author-hero>
  </section>

  <!-- How It Works -->
  <section class="lp-section" data-aos="fade-up">
    <app-how-it-works
      [title]="settings.how_title"
      [items]="pre.howItWorks">
    </app-how-it-works>
  </section>

  <!-- Free Guide Form -->
  <section class="lp-section bg-light" data-aos="zoom-in">
    <app-free-guide-form
      [title]="settings.form_title"
      [submitText]="settings.form_submit_text">
    </app-free-guide-form>
  </section>

  <!-- Why Choose Us -->
  <section class="lp-section" data-aos="fade-up">
    <app-choose-us
      [title]="settings.choose_title"
      [items]="pre.chooseUs">
    </app-choose-us>
  </section>

  <!-- Success Stories -->
  <section class="lp-section bg-light" data-aos="fade-up">
    <app-success-stories
      [title]="settings.stories_title"
      [stories]="pre.statusStories">
    </app-success-stories>
  </section>

  <!-- FAQ -->
  <section class="lp-section" data-aos="fade-up">
    <app-faq
      [title]="settings.faq_title"
      [items]="pre.faq">
    </app-faq>
  </section>

</div>
