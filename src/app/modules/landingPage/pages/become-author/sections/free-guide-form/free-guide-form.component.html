<div class="py-5">
  <div class="guide-form card shadow-sm p-4 mx-auto border-0"
       data-aos="fade-up"
       data-aos-duration="1000">
    <h2 class="section-title text-center mb-4"
        data-aos="fade-down"
        data-aos-duration="900">
      {{ title }}
    </h2>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
      <!-- Full Name -->
      <div class="mb-3"
           data-aos="fade-up"
           data-aos-delay="200"
           data-aos-duration="800">
        <label class="form-label">Full Name</label>
        <input type="text" class="form-control" formControlName="name" placeholder="Enter your full name" />
        <div *ngIf="hasError('name','required')" class="invalid-feedback animate-error">
          Full name is required
        </div>
        <div *ngIf="hasError('name','minlength')" class="invalid-feedback animate-error">
          Name must be at least 3 characters
        </div>
      </div>

      <!-- Email -->
      <div class="mb-3"
           data-aos="fade-up"
           data-aos-delay="300"
           data-aos-duration="800">
        <label class="form-label">Email Address</label>
        <input type="email" class="form-control" formControlName="email" placeholder="Enter your email" />
        <div *ngIf="hasError('email','required')" class="invalid-feedback animate-error">
          Email is required
        </div>
        <div *ngIf="hasError('email','email')" class="invalid-feedback animate-error">
          Please enter a valid email
        </div>
      </div>

      <!-- Manuscript -->
      <div class="mb-3"
           data-aos="fade-up"
           data-aos-delay="400"
           data-aos-duration="800">
        <label class="form-label">Manuscript Title (Optional)</label>
        <input type="text" class="form-control" formControlName="manuscript" placeholder="Enter your manuscript title" />
      </div>

      <!-- Stage -->
      <div class="mb-3"
           data-aos="fade-up"
           data-aos-delay="500"
           data-aos-duration="800">
        <label class="form-label">Current Stage</label>
        <select class="form-select" formControlName="stage">
          <option value="Writing">Writing</option>
          <option value="Editing">Editing</option>
          <option value="Ready to publish">Ready to publish</option>
          <option value="Submitted">Submitted</option>
        </select>
      </div>

      <!-- Message -->
      <div class="mb-3"
           data-aos="fade-up"
           data-aos-delay="600"
           data-aos-duration="800">
        <label class="form-label">Message (Optional)</label>
        <textarea class="form-control" rows="3" formControlName="message" placeholder="Tell us about your manuscript"></textarea>
      </div>

      <!-- Submit -->
      <button class="btn btn-primary w-100" type="submit"
              data-aos="zoom-in"
              data-aos-delay="700"
              data-aos-duration="800">
        {{ submitText }}
      </button>
    </form>
  </div>
</div>
