<div class="container">
  <div class="success-stories text-center py-5">
    <h2 class="section-title mb-5" data-aos="fade-down" data-aos-duration="1000">
      {{ title }}
    </h2>
    <div class="row g-4 justify-content-center">
      <div class="col-md-4" *ngFor="let story of stories; let i = index">
        <div class="story-card p-4 h-100" data-aos="fade-up" data-aos-duration="900"
          [attr.data-aos-delay]="200 + (i * 200)">
          <img *ngIf="story.avatar" [src]="story.avatar" alt="{{ story.name }}" class="rounded-circle mb-3 avatar"
            data-aos="zoom-in" [attr.data-aos-delay]="250 + (i * 200)" data-aos-duration="800">
          <p class="quote mb-3" data-aos="fade-up" [attr.data-aos-delay]="300 + (i * 200)">
            "{{ story.quote }}"
          </p>
          <h6 class="fw-bold mb-0" data-aos="fade-up" [attr.data-aos-delay]="400 + (i * 200)">
            {{ story.name }}
          </h6>
          <small class="text-muted" data-aos="fade-up" [attr.data-aos-delay]="450 + (i * 200)">
            {{ story.role }}
          </small>
        </div>
      </div>
    </div>
  </div>
</div>
