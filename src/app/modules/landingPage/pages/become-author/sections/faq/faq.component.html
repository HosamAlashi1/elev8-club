<div class="faq py-5">
    <h2 class="section-title text-center mb-5" data-aos="fade-down" data-aos-duration="1000">
        {{ title }}
    </h2>

    <div class="faq-list mx-auto" style="max-width: 800px;">
        <div class="faq-card p-3 mb-3 rounded-3 shadow-sm" *ngFor="let item of items; let i = index" (click)="toggle(i)"
            [class.active]="openIndex === i" data-aos="fade-up" data-aos-duration="900"
            [attr.data-aos-delay]="200 + (i * 150)">

            <!-- Question -->
            <div class="d-flex justify-content-between align-items-center">
                <h6 class="fw-bold mb-0">{{ item.q }}</h6>
                <span class="toggle-icon" [class.rotate]="openIndex === i">+</span>
            </div>

            <!-- Answer -->
            <div class="faq-answer mt-2" [@slideToggle]="openIndex === i ? 'open' : 'closed'">
                <p class="text-muted mb-0">{{ item.a }}</p>
            </div>
        </div>
    </div>
</div>
