<div class="container">
    <div class="choose-us">
        <h2 class="section-title text-center mb-5" data-aos="fade-down" data-aos-duration="1000">
            {{ title }}
        </h2>
        <div class="row g-4">
            <div class="col-md-4 col-sm-6" *ngFor="let item of items; let i = index">
                <div class="choose-card p-4 bg-light rounded-4 h-100" data-aos="fade-up" data-aos-duration="900"
                    [attr.data-aos-delay]="200 + (i * 150)">
                    <div class="icon-circle mb-3" data-aos="zoom-in" [attr.data-aos-delay]="300 + (i * 150)">
                        <img [src]="item.icon" alt="{{ item.title }}" />
                    </div>
                    <h5 class="fw-bold mb-2" data-aos="fade-up" [attr.data-aos-delay]="400 + (i * 150)">
                        {{ item.title }}
                    </h5>
                    <p class="text-muted mb-0" data-aos="fade-up" [attr.data-aos-delay]="500 + (i * 150)">
                        {{ item.desc }}
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
