<div class="container">
  <div class="featured-event card shadow-sm my-4 border-0" data-aos="fade-up" data-aos-duration="1000">

  <div class="row g-4 align-items-center flex-column flex-md-row">

    <!-- صورة -->
    <div class="col-12 col-md-4 pe-md-2 text-center text-md-start" data-aos="fade-right" data-aos-duration="1200">
      <img [src]="event?.image" [alt]="event?.title" class="img-fluid rounded-3 w-100 h-auto"
        style=" max-height: 266px; min-height: 266px; border-top-right-radius:0px !important ; border-bottom-right-radius:0px !important ;">

    </div>

    <!-- تفاصيل -->
    <div class="col-12 col-md-8 ps-md-3 pe-md-5 text-center text-md-start py-3">

      <!-- عنوان السكشن -->
      <h6 class="text-uppercase fw-bold text-accent mb-3" data-aos="fade-left" data-aos-delay="200"
        data-aos-duration="1000">
        {{ sectionTitle }}
      </h6>

      <!-- عنوان الحدث -->
      <h2 class="fw-bold mb-3" style="font-size: 1.9rem;" data-aos="fade-left" data-aos-delay="300"
        data-aos-duration="1000">
        {{ event?.title }}
      </h2>

      <!-- التاريخ والوقت -->
      <div
        class="d-flex flex-column flex-sm-row align-items-center align-items-sm-start justify-content-center justify-content-sm-start text-muted mb-2 gap-2"
        data-aos="fade-up" data-aos-delay="400" data-aos-duration="900">
        <i class="bi bi-calendar-event me-2"></i>
        <span>{{ event?.date }} · {{ event?.time }}</span>
      </div>

      <!-- الموقع -->
      <div
        class="d-flex flex-column flex-sm-row align-items-center align-items-sm-start justify-content-center justify-content-sm-start text-muted mb-3 gap-2"
        data-aos="fade-up" data-aos-delay="500" data-aos-duration="900">
        <i class="bi bi-geo-alt me-2"></i>
        <span>{{ event?.location }}</span>
      </div>

      <!-- الوصف -->
      <p class="text-muted mb-4" data-aos="fade-left" data-aos-delay="600" data-aos-duration="1000">
        {{ event?.description }}
      </p>

      <!-- زر CTA -->
      <a [href]="event?.buttonLink" class="btn btn-custom" data-aos="zoom-in" data-aos-delay="800"
        data-aos-duration="900">
        {{ event?.buttonText }}
      </a>
    </div>
  </div>
</div>
</div>
