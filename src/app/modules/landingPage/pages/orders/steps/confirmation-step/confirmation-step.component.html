<div class="container my-5">
  <div class="row justify-content-center">
    <div class="col-lg-6">

      <div class="card-section text-center p-5 animate-card">
        
        <!-- Icon -->
        <div class="status-icon mb-4" [ngClass]="status">
          <i class="fa-solid" 
             [class.fa-circle-check]="status === 'success'" 
             [class.fa-circle-xmark]="status === 'error'">
          </i>
        </div>

        <!-- Title -->
        <h3 class="fw-bold mb-3" *ngIf="status === 'success'">Order Confirmed 🎉</h3>
        <h3 class="fw-bold mb-3 text-danger" *ngIf="status === 'error'">Order Failed ❌</h3>

        <!-- Message -->
        <p class="text-muted mb-4" *ngIf="status === 'success'">
          Thank you! Your order has been placed successfully.
        </p>
        <p class="text-muted mb-4" *ngIf="status === 'error'">
          Oops! Something went wrong. Please try again.
        </p>

        <!-- Order Details -->
        <div class="order-info mb-4">
          <p><strong>Order ID:</strong> {{ orderId }}</p>
          <p *ngIf="total"><strong>Total:</strong> ${{ total }}</p>
        </div>

        <!-- Countdown -->
        <div class="countdown-wrapper mb-3">
          <div class="progress">
            <div class="progress-bar" [style.width.%]="(countdown/10)*100"></div>
          </div>
          <p class="text-muted small mt-2">
            Redirecting in <strong>{{ countdown }}</strong> seconds...
          </p>
        </div>

        <!-- Button -->
        <button class="btn-cart w-100" (click)="back()">
          {{ status === 'success' ? 'Back to Home' : 'Back to Cart' }}
        </button>
      </div>

    </div>
  </div>
</div>
