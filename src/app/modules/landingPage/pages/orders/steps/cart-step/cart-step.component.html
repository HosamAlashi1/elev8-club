<div class="cart-container container my-5">
   <!-- Title + Package Image -->
  <div class="row mb-4 align-items-center" data-aos="fade-up" data-aos-duration="800">
    <div class="col-lg-7">
      <h2 class="cart-title fw-bold mb-3">
        EDKD – Early Detection Kidney Disease Package
      </h2>
      <p class="cart-desc text-muted mb-4">
        AI-powered home urine testing kit with smartphone integration.
      </p>
    </div>
    <div class="col-lg-5 text-center">
      <!-- ✅ صورة البكج -->
      <img src="assets/img/hreo-img.png" alt="EDKD Package"
           class="package-img img-fluid" data-aos="fade-left" data-aos-duration="800">
    </div>
  </div>

  <!-- Features -->
  <div class="row px-2 g-4 mb-4">
    <div class="col-md-4" *ngFor="let f of features; let i = index"
         data-aos="fade-up" data-aos-duration="800" [attr.data-aos-delay]="i * 200">
      <div class="feature-card h-100 text-start">
        <img [src]="f.image" alt="{{ f.title }}" class="feature-img mb-4">
        <h5 class="mb-2">{{ f.title }}</h5>
        <p class="text-muted">{{ f.description }}</p>
      </div>
    </div>
  </div>

  <!-- Pricing & Counter -->
  <div class="row align-items-center px-3 mx-2 gy-3 my-5 pricing"
       data-aos="fade-up" data-aos-duration="800" data-aos-delay="200">
    <div class="col-md-4">
      <div class="price mb-2">
        <div class="amount mb-2">${{ pricePerUnit }}</div>
        <div class="label">Price per package</div>
      </div>
    </div>
    <div class="col-md-4">
      <div class="price mb-2">
        <div class="amount mb-2">${{ totalPrice }}</div>
        <div class="label">Total Price</div>
      </div>
    </div>
    <div class="col-md-4 text-md-end">
      <div class="counter d-inline-flex align-items-center">
        <button class="btn-counter" (click)="decrease()">−</button>
        <span class="mx-3 fw-bold fs-5">{{ quantity }}</span>
        <button class="btn-counter" (click)="increase()">+</button>
      </div>
    </div>
  </div>

  <!-- Add to Cart -->
  <div class="text-center mt-5" data-aos="zoom-in" data-aos-duration="800">
    <button class="btn-cart w-100" (click)="goToDetails()">
      Add to Cart
    </button>
  </div>
</div>
