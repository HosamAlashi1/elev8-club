<section class="before-after-section" data-aos="fade-up">

    <div class="bg-lines"></div>

    <div class="container">

        <!-- العنوان -->
        <div class="title-wrapper" data-aos="fade-up" data-aos-delay="100">
            <h2 class="main-title">التحوّل خلال 7 أيام</h2>
        </div>

        <div class="cards-grid">

            <!-- قبل التحدي -->
            <div class="card before" data-aos="fade-left" data-aos-delay="200">

                <div class="card-header p-0">
                    <div class="icon-circle red">
                        <lucide-angular name="x" class="icon"></lucide-angular>
                    </div>
                    <h3 class="card-title">قبل التحدي</h3>
                </div>

                <div class="card-list">
                    <div class="list-item" *ngFor="let item of beforeItems; let i = index" data-aos="fade-left"
                        [attr.data-aos-delay]="300 + i * 120">
                        <lucide-angular name="x" class="list-icon red"></lucide-angular>
                        <span>{{ item }}</span>
                    </div>
                </div>

            </div>

            <!-- بعد التحدي -->
            <div class="card after" data-aos="fade-right" data-aos-delay="200">

                <div class="card-header p-0">
                    <div class="icon-circle gold">
                        <lucide-angular name="check" class="icon gold"></lucide-angular>
                    </div>
                    <h3 class="card-title gold-text">بعد التحدي</h3>
                </div>

                <div class="card-list">
                    <div class="list-item" *ngFor="let item of afterItems; let i = index" data-aos="fade-right"
                        [attr.data-aos-delay]="350 + i * 120">
                        <lucide-angular name="check" class="list-icon gold"></lucide-angular>
                        <span>{{ item }}</span>
                    </div>
                </div>

            </div>

        </div>

        <!-- النص السفلي -->
        <div class="bottom-quote " data-aos="fade-up" data-aos-delay="800">
            <p class="quote">
                "في 7 أيام رح تتغيّر طريقتك في التفكير قبل ما يتغيّر رصيدك."
            </p>

            <button class="btn-cta btn-cta-primary btn-cta-lg" (click)="onOpenRegistration()">
                <span class="btn-cta-text"> سجّل وابدأ التغيير</span>

                <svg class="btn-cta-icon" width="22" height="22" viewBox="0 0 24 24" fill="none">
                    <path d="M3 17L9.5 10.5L14 15L21 8" stroke="white" stroke-width="2.2" stroke-linecap="round"
                        stroke-linejoin="round" />
                    <path d="M16 8H21V13" stroke="white" stroke-width="2.2" stroke-linecap="round"
                        stroke-linejoin="round" />
                </svg>

                <div class="ripple-gold"></div>
            </button>
        </div>

    </div>

</section>
