<!-- Staff Picks Section -->
<section class="staff-picks-section py-4" data-aos="fade-in" data-aos-duration="1500">
  <div class="container">
    <!-- Section Title -->
    <h2 class="fw-bold mb-4" data-aos="fade-up" data-aos-duration="1200">
      {{ title }}
    </h2>

    <!-- Shared Slider للكتب -->
    <app-slider 
      [items]="books" 
      type="card" 
      [slidesPerView]="4" 
      direction="ltr"
  >
    </app-slider>

    <!-- Staff Profile + Books -->
    <div class="staff-profile row align-items-center my-5 p-4 py-5 bg-light rounded">
      <!-- البروفايل -->
      <div class="col-md-4 text-center mb-4 mb-md-0" 
           data-aos="fade-right" 
           data-aos-duration="1200">
        <img [src]="staff.img" [alt]="staff.name" class="rounded-circle profile-img mb-3">
        <h5 class="fw-bold mb-1">{{ staff.name }}</h5>
        <p class="fst-italic text-muted">{{ staff.quote }}</p>
      </div>

      <!-- الكتب -->
      <div class="col-md-8">
        <div class="row g-3">
          <div class="col-6 col-md-4" 
               *ngFor="let book of staff.books; let i = index" 
               data-aos="zoom-in-up"
               [attr.data-aos-delay]="i * 500" 
               data-aos-duration="1200">
            
            <div class="staff-book-card h-100 p-3" 
                 [routerLink]="['/book', book.id]" 
                 style="cursor: pointer;">
              <img [src]="book.img" [alt]="book.title" class="img-fluid rounded mb-2">
              <h6 class="fw-bold">{{ book.title }}</h6>
              <p class="text-muted small my-1">{{ book.author }}</p>
              <p class="fw-bold mb-0">{{ book.price }}</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
