<div class="hero position-relative text-white d-flex align-items-center">

    <!-- الخلفية -->
    <div class="hero-bg">
        <img [src]="background" alt="Hero Background">
        <img src="assets/img/landing/home/hero/overlay.png" alt="Overlay" class="hero-overlay">
    </div>

    <!-- العناصر المتحركة الجذابة -->
    <div class="floating-elements">
        <!-- النجوم المتلألئة -->
        <div class="star star-1"></div>
        <div class="star star-2"></div>
        <div class="star star-3"></div>
        <div class="star star-4"></div>
        <div class="star star-5"></div>
        
        <!-- الدوائر العائمة -->
        <div class="floating-circle circle-1"></div>
        <div class="floating-circle circle-2"></div>
        <div class="floating-circle circle-3"></div>
        
        <!-- خطوط الطاقة -->
        <div class="energy-line line-1"></div>
        <div class="energy-line line-2"></div>
        
        <!-- نقاط متحركة -->
        <div class="moving-dot dot-1"></div>
        <div class="moving-dot dot-2"></div>
        <div class="moving-dot dot-3"></div>
        <div class="moving-dot dot-4"></div>
    </div>

    <div class="container position-relative z-2">
        <div class="row align-items-center">

            <!-- النص -->
            <div class="col-lg-6 text-center text-lg-start hero-text-wrapper" data-aos="fade-right-custom">
                <h1 class="hero-title fx-shimmer fx-underline mb-3 " data-aos="fade-right">
                    {{ title }}
                    <!-- هالة متوهجة حول العنوان -->
                    <div class="title-glow"></div>
                </h1>
                <p class="hero-subtitle mb-4" data-aos="fade-left" data-aos-delay="600">{{ subtitle }}</p>
                <a *ngIf="buttonText" [routerLink]="buttonLink" class="btn btn-custom lp-hero-cta"
                    data-aos="fade-up-custom" data-aos-delay="400">
                    {{ buttonText }}
                      <div class="bg-anim"></div>
                    <span class="orbit"></span>
                    <span class="orbit"></span>
                </a>
            </div>

            <!-- السلايدر -->
            <div class="col-lg-6 mt-4 mt-lg-0 hero-slider-wrapper" data-aos="fade-left-custom" data-aos-delay="300">
                <div class="hero-slider">
                    <div class="slide" *ngFor="let slide of slides; let i = index" [class.active]="i === currentSlide">
                        <img [src]="slide.img" [alt]="slide.alt || 'Book Cover'" class="book-slide">
                    </div>
                    <!-- دوائر متوهجة حول الصور -->
                    <div class="image-orbit orbit-ring-1"></div>
                    <div class="image-orbit orbit-ring-2"></div>
                    <!-- شعاع ضوئي -->
                    <div class="light-beam"></div>
                </div>
            </div>

        </div>
    </div>
</div>
