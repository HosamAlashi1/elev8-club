<section class="contact-section" data-aos="fade-up" data-aos-duration="800">

  <!-- Background Glow -->
  <div class="background-glow"></div>

  <div class="container">

    <!-- Title -->
    <div class="title-wrapper" data-aos="fade-up" data-aos-delay="100" data-aos-duration="800">
      <h2 class="main-title heading-3d">ابقَ على تواصل مع <span class="highlight-gold">Elev8 Club</span></h2>
      <p class="subtitle">تابعنا لتصلك آخر الأخبار والتحديثات</p>
    </div>

    <!-- Social Cards -->
    <div class="social-cards" data-aos="fade-up" data-aos-delay="200" data-aos-duration="800">

      <a *ngFor="let social of socials; let i = index" 
         [href]="social.link" 
         target="_blank" 
         rel="noopener noreferrer"
         class="social-card"
         data-aos="zoom-in"
         [attr.data-aos-delay]="300 + (i * 100)"
         data-aos-duration="600">

        <div class="card-content">
          
          <!-- Icon -->
          <div class="icon-wrapper" [style.border-color]="social.color">
            
            <!-- Email Icon -->
            <svg *ngIf="social.icon === 'mail'" width="24" height="24" viewBox="0 0 24 24" fill="none" [attr.stroke]="social.color">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              <polyline points="22,6 12,13 2,6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>

            <!-- Telegram Icon -->
            <svg *ngIf="social.icon === 'send'" width="24" height="24" viewBox="0 0 24 24" fill="none" [attr.stroke]="social.color">
              <line x1="22" y1="2" x2="11" y2="13" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              <polygon points="22 2 15 22 11 13 2 9 22 2" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>

            <!-- Instagram Icon -->
            <svg *ngIf="social.icon === 'instagram'" width="24" height="24" viewBox="0 0 24 24" fill="none" [attr.stroke]="social.color">
              <rect x="2" y="2" width="20" height="20" rx="5" ry="5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              <line x1="17.5" y1="6.5" x2="17.51" y2="6.5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>

          </div>

          <!-- Name -->
          <h3 class="social-name">{{ social.name }}</h3>

          <!-- Handle -->
          <p class="social-handle" dir="ltr">{{ social.handle }}</p>

          <!-- Hover Glow -->
          <div class="hover-glow" [style.background-color]="social.color + '20'"></div>
        </div>

      </a>

    </div>

    <!-- Bottom Text -->
    <div class="bottom-text" data-aos="fade-up" data-aos-delay="600" data-aos-duration="800">
      <p class="text">
        تابعنا وكن جزء من مجتمع <span class="highlight-gold">Elev8 Club</span>
      </p>
    </div>

  </div>

</section>
