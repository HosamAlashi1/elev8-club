<section class="order-demo-section">
  <div class="container py-5">
    <div class="row align-items-center">
      <!-- Left side -->
      <div class="col-lg-6 text-center text-lg-start mb-4 mb-lg-0"
           data-aos="fade-right" data-aos-duration="800">
        <h2 class="fw-bold text-white mb-3">{{ title }}</h2>
        <p class="text-white mb-4">
          {{ description }}
        </p>
        <button class="btn btn-light btn-order px-4 py-2 rounded-pill lp-navbar-cta" routerLink="/orders">
          Order Now !
        </button>
      </div>

      <!-- Right side -->
      <div class="col-lg-6 position-relative text-center"
           data-aos="fade-left" data-aos-duration="800">
        <!-- Foreground product image -->
        <img src="assets/img/order.svg" alt="Order Demo" class="order-img">
      </div>
    </div>
  </div>

  <!-- Background pattern -->
  <img src="assets/img/order-background.svg" alt="Order Background" class="order-bg">
</section>
