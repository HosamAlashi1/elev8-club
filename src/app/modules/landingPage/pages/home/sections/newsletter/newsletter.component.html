<section class="newsletter-section py-5" data-aos="fade-up" data-aos-duration="1200">
  <div class="container text-center my-4">
    <!-- العنوان -->
    <h2 class="fw-bold mb-3" data-aos="fade-up" data-aos-delay="100" data-aos-duration="1000">
      {{ title }}
    </h2>
    <p class="text-muted mb-4 mx-auto" style="max-width: 520px;" 
       data-aos="fade-up" data-aos-delay="200" data-aos-duration="1000">
      {{ subtitle }}
    </p>

    <!-- فورم الاشتراك -->
    <form class="newsletter-form d-flex justify-content-center flex-wrap gap-2"
          data-aos="zoom-in" data-aos-delay="300" data-aos-duration="1000">
      <input type="email" 
             class="form-control w-auto flex-grow-1"
             placeholder="Enter your email address" 
             required>
      <button type="submit" class="btn btn-custom px-4">
        Subscribe
      </button>
    </form>
  </div>
</section>
