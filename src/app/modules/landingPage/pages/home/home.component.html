<!-- Home Page Content (بدون navbar/footer - موجودين في الـ layout) -->
<div class="home-content animate-route">
  
  <!-- Hero -->
  <section id="home" class="lp-section mt-4" @fadeInUp>
    <app-hero class="hero-animate" 
      [background]="pre?.hero?.background" 
      [slides]="pre?.hero?.slides"
      [title]="settings['hero_title']" 
      [subtitle]="settings['hero_subtitle']" 
      [buttonText]="'Shop Now'"
      [buttonLink]="'/shop'">
    </app-hero>
  </section>

  <!-- Intro / Trust -->
  <section class="lp-section" @cardAnimation>
    <app-intro-trust class="card-animate" 
      [sectionTitle]="settings['services_title']" 
      [sectionDescription]="settings['services_subtitle']" 
      [items]="pre?.introTrust">
    </app-intro-trust>
  </section>

  <!-- Featured Books (سلايدر) -->
  <section class="lp-section bg-light" @cardAnimation>
    <app-featured-books class="card-animate" 
      [title]="settings['featured_title']" 
      [items]="pre?.featuredBooks">
    </app-featured-books>
  </section>

  <!-- Categories -->
  <section class="lp-section bg-light" @cardAnimation>
    <app-categories class="card-animate" 
      [title]="settings['category_title']" 
      [items]="pre?.categories">
    </app-categories>
  </section>

  <!-- Bestselling -->
  <section id="best-sellers" class="lp-section " @cardAnimation>
    <app-bestselling class="card-animate" 
      [title]="settings['bestselling_title']" 
      [items]="pre?.bestsellingBooks">
    </app-bestselling>
  </section>

  <!-- Staff Picks -->
  <section class="lp-section" @cardAnimation>
    <app-staff-picks class="card-animate" 
      [title]="settings['staff_title']" 
      [staff]="pre?.staffPicks?.staff"
      [books]="pre?.staffPicks?.books">
    </app-staff-picks>
  </section>

  <!-- Award Winners -->
  <section class="lp-section bg-light" @cardAnimation>
    <app-award-winners class="card-animate" 
      [title]="settings['awards_title']"
      [firstRow]="pre?.awardWinners?.firstRow" 
      [secondRow]="pre?.awardWinners?.secondRow">
    </app-award-winners>
  </section>

  <!-- Testimonials -->
  <section class="lp-section" @cardAnimation>
    <app-testimonials class="card-animate"
      [title]="settings['testimonials_title']"
      [testimonials]="pre?.testimonials">
    </app-testimonials>
  </section>

  <!-- Newsletter -->
  <section class="lp-section bg-light" @cardAnimation>
    <app-newsletter class="card-animate" 
      [title]="settings['subscribe_title'] || 'Join Our Literary Community'"
      [subtitle]="settings['subscribe_subtitle'] || 'Subscribe to receive new releases, author events, special offers, and exclusive content.'">
    </app-newsletter>
  </section>

  <!-- Blog -->
  <section class="lp-section" @cardAnimation>
    <app-blog class="card-animate" 
      [title]="settings['blog_title']" 
      [items]="pre?.blogs">
    </app-blog>
  </section>

  <!-- Contact -->
  <section id="contact" class="lp-section bg-light" @cardAnimation>
    <app-contact class="card-animate" 
      [title]="settings['contact_title']" 
      [phone]="settings['contact_phone']"
      [email]="settings['contact_email']" 
      [address]="settings['contact_address']" 
      [business_hours]="(settings['contact_hours_weekdays'] || '') + '\n' + (settings['contact_hours_saturday'] || '') + '\n' + (settings['contact_hours_sunday'] || '')">
    </app-contact>
  </section>

</div>
