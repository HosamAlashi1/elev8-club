<div class="home-content animate-route">

  <!-- Advanced Trading Animation Background -->
  <div class="luxury-trading-bg">
    <!-- Layer 1: Animated Grid -->
    <div class="grid-layer">
      <svg class="grid-svg" viewBox="0 0 1000 1000" preserveAspectRatio="none">
        <defs>
          <pattern id="grid-pattern" x="0" y="0" width="50" height="50" patternUnits="userSpaceOnUse">
            <path d="M 50 0 L 0 0 0 50" fill="none" stroke="rgba(207, 174, 88, 0.15)" stroke-width="0.5"/>
          </pattern>
          <linearGradient id="grid-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="rgba(207, 174, 88, 0.3)"/>
            <stop offset="50%" stop-color="rgba(207, 174, 88, 0.1)"/>
            <stop offset="100%" stop-color="rgba(207, 174, 88, 0)"/>
          </linearGradient>
        </defs>
        <rect width="100%" height="100%" fill="url(#grid-pattern)" opacity="0.4"/>
        <rect width="100%" height="30%" fill="url(#grid-gradient)"/>
      </svg>
    </div>

    <!-- Layer 2: Dynamic Candlestick Chart -->
    <div class="candlestick-chart">
      <div class="chart-candlestick" *ngFor="let candle of candlesticks; let i = index" 
           [style.left.%]="candle.position"
           [style.animation-delay.s]="candle.delay"
           [class.bullish]="candle.bullish"
           [class.bearish]="!candle.bullish">
        <div class="candle-wick-top"></div>
        <div class="candle-body"></div>
        <div class="candle-wick-bottom"></div>
      </div>
    </div>

    <!-- Layer 3: Flowing Chart Lines with Dots -->
    <svg class="chart-flow-lines" viewBox="0 0 100 100" preserveAspectRatio="none">
      <defs>
        <linearGradient id="line-gradient-1" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="rgba(207, 174, 88, 0)"/>
          <stop offset="50%" stop-color="rgba(207, 174, 88, 0.8)"/>
          <stop offset="100%" stop-color="rgba(207, 174, 88, 0)"/>
        </linearGradient>
        <linearGradient id="line-gradient-2" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="rgba(76, 175, 80, 0)"/>
          <stop offset="50%" stop-color="rgba(76, 175, 80, 0.6)"/>
          <stop offset="100%" stop-color="rgba(76, 175, 80, 0)"/>
        </linearGradient>
        <filter id="glow">
          <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
          <feMerge>
            <feMergeNode in="coloredBlur"/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>
      </defs>
      
      <path class="flow-path path-1" 
            d="M 0 50 Q 25 30, 50 45 T 100 40" 
            stroke="url(#line-gradient-1)" 
            stroke-width="0.3" 
            fill="none"
            filter="url(#glow)"/>
            
      <path class="flow-path path-2" 
            d="M 0 60 Q 25 70, 50 55 T 100 65" 
            stroke="url(#line-gradient-2)" 
            stroke-width="0.25" 
            fill="none"
            filter="url(#glow)"/>
            
      <path class="flow-path path-3" 
            d="M 0 45 Q 25 40, 50 50 T 100 48" 
            stroke="url(#line-gradient-1)" 
            stroke-width="0.2" 
            fill="none"
            filter="url(#glow)"/>

      <!-- Animated Dots on Lines -->
      <circle class="line-dot dot-1" r="0.5" fill="#CFAE58" filter="url(#glow)">
        <animateMotion dur="8s" repeatCount="indefinite" 
                       path="M 0 50 Q 25 30, 50 45 T 100 40"/>
      </circle>
      <circle class="line-dot dot-2" r="0.4" fill="#4CAF50" filter="url(#glow)">
        <animateMotion dur="10s" repeatCount="indefinite" 
                       path="M 0 60 Q 25 70, 50 55 T 100 65"/>
      </circle>
    </svg>

    <!-- Layer 4: Floating Price Particles -->
    <div class="price-particles">
      <div class="particle" *ngFor="let particle of priceParticles; let i = index"
           [style.left.%]="particle.x"
           [style.top.%]="particle.y"
           [style.animation-delay.s]="particle.delay"
           [class.profit]="particle.isProfit">
        {{ particle.value }}
      </div>
    </div>

    <!-- Layer 5: Golden Liquid Waves -->
    <div class="liquid-waves">
      <svg class="wave-svg" viewBox="0 0 1200 200" preserveAspectRatio="none">
        <defs>
          <linearGradient id="wave-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="rgba(207, 174, 88, 0.2)"/>
            <stop offset="100%" stop-color="rgba(207, 174, 88, 0)"/>
          </linearGradient>
        </defs>
        <path class="liquid-wave wave-1" 
              d="M0,100 Q150,80 300,100 T600,100 T900,100 T1200,100 L1200,200 L0,200 Z" 
              fill="url(#wave-gradient)"/>
        <path class="liquid-wave wave-2" 
              d="M0,110 Q200,90 400,110 T800,110 T1200,110 L1200,200 L0,200 Z" 
              fill="url(#wave-gradient)" 
              opacity="0.7"/>
        <path class="liquid-wave wave-3" 
              d="M0,120 Q250,100 500,120 T1000,120 T1200,120 L1200,200 L0,200 Z" 
              fill="url(#wave-gradient)" 
              opacity="0.5"/>
      </svg>
    </div>

    <!-- Layer 6: Trading Volume Bars -->
    <div class="volume-bars">
      <div class="volume-bar" *ngFor="let bar of volumeBars; let i = index"
           [style.left.%]="bar.position"
           [style.height.%]="bar.height"
           [style.animation-delay.s]="bar.delay"
           [class.high-volume]="bar.isHigh">
      </div>
    </div>

    <!-- Layer 7: Geometric Shapes (Triangles & Hexagons) -->
    <div class="geometric-shapes">
      <svg class="shape triangle-up" viewBox="0 0 100 100">
        <polygon points="50,10 90,90 10,90" fill="none" stroke="rgba(76, 175, 80, 0.3)" stroke-width="2"/>
      </svg>
      <svg class="shape triangle-down" viewBox="0 0 100 100">
        <polygon points="50,90 10,10 90,10" fill="none" stroke="rgba(244, 67, 54, 0.3)" stroke-width="2"/>
      </svg>
      <svg class="shape hexagon" viewBox="0 0 100 100">
        <polygon points="50,5 90,25 90,75 50,95 10,75 10,25" fill="none" stroke="rgba(207, 174, 88, 0.3)" stroke-width="1.5"/>
      </svg>
    </div>

    <!-- Layer 8: Market Data Ticker -->
    <div class="market-ticker-scroll">
      <div class="ticker-content">
        <span class="ticker-item" *ngFor="let ticker of marketTickers">
          <span class="ticker-symbol">{{ ticker.symbol }}</span>
          <span class="ticker-price">{{ ticker.price }}</span>
          <span class="ticker-change" [class.up]="ticker.change > 0" [class.down]="ticker.change < 0">
            {{ ticker.change > 0 ? '+' : '' }}{{ ticker.change }}%
          </span>
        </span>
      </div>
      <div class="ticker-content" aria-hidden="true">
        <span class="ticker-item" *ngFor="let ticker of marketTickers">
          <span class="ticker-symbol">{{ ticker.symbol }}</span>
          <span class="ticker-price">{{ ticker.price }}</span>
          <span class="ticker-change" [class.up]="ticker.change > 0" [class.down]="ticker.change < 0">
            {{ ticker.change > 0 ? '+' : '' }}{{ ticker.change }}%
          </span>
        </span>
      </div>
    </div>

    <!-- Layer 9: Pulsing Order Book -->
    <div class="order-book-visual">
      <div class="order-line buy-order" *ngFor="let order of buyOrders; let i = index"
           [style.width.%]="order.width"
           [style.animation-delay.s]="order.delay">
      </div>
      <div class="order-line sell-order" *ngFor="let order of sellOrders; let i = index"
           [style.width.%]="order.width"
           [style.animation-delay.s]="order.delay">
      </div>
    </div>

    <!-- Layer 10: Glowing Trading Signals -->
    <div class="trading-signals">
      <div class="signal buy-signal" *ngFor="let signal of buySignals"
           [style.left.%]="signal.x"
           [style.top.%]="signal.y"
           [style.animation-delay.s]="signal.delay">
        <div class="signal-icon">↗</div>
        <div class="signal-pulse"></div>
      </div>
      <div class="signal sell-signal" *ngFor="let signal of sellSignals"
           [style.left.%]="signal.x"
           [style.top.%]="signal.y"
           [style.animation-delay.s]="signal.delay">
        <div class="signal-icon">↘</div>
        <div class="signal-pulse"></div>
      </div>
    </div>
  </div>

  <app-hero-section [onOpenRegistration]="openRegistrationPopup"></app-hero-section>
  <app-stats-section></app-stats-section>
  <app-features-section [onOpenRegistration]="openRegistrationPopup"></app-features-section>
  <app-before-after-section [onOpenRegistration]="openRegistrationPopup"></app-before-after-section>
  <app-journey-section [onOpenRegistration]="openRegistrationPopup"></app-journey-section>
  <app-video-testimonials-section [onOpenRegistration]="openRegistrationPopup"></app-video-testimonials-section>
  <app-suitable-check-section [onOpenRegistration]="openRegistrationPopup"></app-suitable-check-section>
  <app-written-testimonials-section [onOpenRegistration]="openRegistrationPopup"></app-written-testimonials-section>
  <app-big-cta-section [onOpenRegistration]="openRegistrationPopup"></app-big-cta-section>
  <app-faq-section></app-faq-section>
  <app-contact-section></app-contact-section>

  <!-- Registration Modal -->
  <app-register-popup 
    [isOpen]="isRegistrationPopupOpen" 
    (closePopup)="closeRegistrationPopup()">
  </app-register-popup>

</div>
