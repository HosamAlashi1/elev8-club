<!-- Main Content -->
<div *ngIf="landingData" class="content-container" 
     [class.content-hidden]="!showContent" 
     [class.content-visible]="showContent">
     
  <!-- Sticky Navbar (شفاف ثم يتلوّن عند التمرير) -->
  <app-navbar 
    [iosAppLink]="settings['link_ios_app']"
    [androidAppLink]="settings['link_android_app']"
    [@fadeInUp]>
  </app-navbar>

  <!-- Hero -->
  <section id="about" class="lp-section pt-4" [@fadeInUp]>
    <app-hero 
      [heroTitle]="settings['hero_title']"
      [heroDescription]="settings['hero_desc']"
      [heroImage]="settings['hero_image']"
      [heroLearnMoreLink]="settings['hero_learn_more_link']"
      [iosAppLink]="settings['link_ios_app']"
      [androidAppLink]="settings['link_android_app']">
    </app-hero>
  </section>

  <!-- Solution -->
  <section id="how-it-works" class="lp-section" [@cardAnimation]>
    <app-solution 
      [title]="settings['solution_title']"
      [description]="settings['solution_desc']"
      [image]="settings['solution_image']"
      [features]="[
        settings['solution_list_first'],
        settings['solution_list_second'],
        settings['solution_list_third'],
        settings['solution_list_forth']
      ]">
    </app-solution>
  </section>

  <!-- Process -->
  <section class="lp-section bg-light" [@cardAnimation]>
    <app-process 
      [title]="settings['process_title']"
      [processes]="landingData.processes">
    </app-process>
  </section>

  <!-- Features -->
  <section id="features" class="lp-section" [@cardAnimation]>
    <app-features 
      [title]="settings['features_title']"
      [features]="landingData.features">
    </app-features>
  </section>

  <!-- App Preview -->
  <section class="lp-section bg-light" [@cardAnimation]>
    <app-app-preview 
      [title]="settings['app_preview_title']"
      [appPreviews]="landingData.app_previews">
    </app-app-preview>
  </section>

  <!-- Metrics -->
  <section class="lp-section" [@cardAnimation]>
    <app-metrics 
      [testsCompleted]="settings['tests_completed']"
      [medicalCenters]="settings['medical_centers']"
      [accuracyRate]="settings['accuracy_rate']"
      [customerSupport]="settings['customer_support']">
    </app-metrics>
  </section>

  <!-- Testimonials -->
  <section class="lp-section bg-light" [@cardAnimation]>
    <app-testimonials 
      [title]="settings['testimonial_title']"
      [testimonials]="landingData.testimonials">
    </app-testimonials>
  </section>

  <!-- CTA -->
  <section class="lp-section" [@cardAnimation]>
    <app-cta 
      [title]="settings['get_started_title']"
      [qrCodeImage]="settings['get_started_QR_code_image']"
      [iosAppLink]="settings['link_ios_app']"
      [androidAppLink]="settings['link_android_app']">
    </app-cta>
  </section>

  <!-- Contact -->
  <section id="contact" class="lp-section bg-light" [@cardAnimation]>
    <app-contact 
      [title]="settings['contact_us_title']"
      [phone]="settings['phone']"
      [email]="settings['email']"
      [address]="settings['address']"
      [facebook]="settings['facebook']"
      [twitter]="settings['twitter']"
      [instagram]="settings['instagram']"
      [linkedin]="settings['linkedin']">
    </app-contact>
  </section>

  <!-- Footer -->
  <app-footer 
    [description]="settings['footer_title']"
    [facebook]="settings['facebook']"
    [twitter]="settings['twitter']"
    [linkedin]="settings['linkedin']"
    [instagram]="settings['instagram']"
    [@fadeInUp]>
  </app-footer>
</div>

<!-- Loading State للمحتوى -->
<div *ngIf="!landingData || !showContent" class="content-loader">
  <div class="d-flex justify-content-center align-items-center" style="min-height: 200px;">
    <div class="text-center">
      <div class="spinner-border text-primary mb-3" role="status">
        <span class="sr-only">جاري التحميل...</span>
      </div>
      <p class="text-muted">جاري تحضير المحتوى...</p>
    </div>
  </div>
</div>
