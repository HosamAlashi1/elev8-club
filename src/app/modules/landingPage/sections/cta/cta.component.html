<div class="container py-5">

  <!-- العنوان -->
  <div class="text-center pt-3 mb-4" data-aos="fade-up"  data-aos-delay="400" data-aos-duration="800">
    <h3 class="section-title st-divider mb-0" data-aos="fade-up" data-aos-duration="800">{{ title }} <span class="dot"></span></h3>
  </div>

  <!-- أزرار المتاجر -->
  <div class="d-flex justify-content-center align-items-center gap-3 mb-5">
    <a
      *ngFor="let s of stores; index as i"
      class="store-link"
      [href]="s.href"
      target="_blank"
      rel="noopener"
      data-aos="fade-up"
      [attr.data-aos-delay]="i * 250"
      data-aos-duration="800"
      role="button"
      [attr.aria-label]="s.alt"
    >
      <img [src]="s.src" [alt]="s.alt" class="store-badge">
    </a>
  </div>

  <!-- QR Code -->
  <div class="text-center pb-4 pt-2" data-aos="zoom-in" data-aos-duration="800" data-aos-delay="500">
    <img [src]="qrSrc" alt="Scan the QR code to download" class="qr-img">
  </div>
</div>
