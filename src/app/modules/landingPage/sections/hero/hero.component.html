<section class="lp-hero d-flex align-items-center py-5 my-5">
    <div class="container">
        <div class="row align-items-center">

            <!-- النصوص -->
            <div class="col-lg-6 mb-5 mb-lg-0" data-aos="fade-up" data-aos-delay="100">
                <h1 class="fw-bold mb-4" [innerHTML]="heroTitle">
                </h1>
                <p class="text-muted mb-4" style="max-width: 520px;">
                    {{ heroDescription }}
                </p>

                <div class="d-flex flex-wrap align-items-center gap-3 mb-4">
                    <a *ngIf="iosAppLink && iosAppLink !== '#'" [href]="iosAppLink" target="_blank">
                        <img src="assets/img/apple-store.svg" alt="App Store" class="store-btn">
                    </a>
                    <a *ngIf="androidAppLink && androidAppLink !== '#'" [href]="androidAppLink" target="_blank">
                        <img src="assets/img/google-store.svg" alt="Google Play" class="store-btn">
                    </a>
                </div>

                <a *ngIf="heroLearnMoreLink && heroLearnMoreLink !== '#'" [href]="heroLearnMoreLink" class="learn-more-link">
                    Learn More
                    <i class="fa-solid fa-arrow-right pt-1"></i>
                </a>
            </div>

            <!-- صورة المنتج -->
            <div class="col-lg-6 text-center" data-aos="fade-up" data-aos-delay="300">
                <img src="assets/img/hero-image.png" alt="EDKD Kit" class="hero-img">
            </div>

        </div>
    </div>
</section>
