<footer class="site-footer" data-aos="fade-right" data-aos-duration="800">
  <div class="container">

    <!-- أعلى الفوتر -->
    <div class="row footer-top g-4 gx-lg-5 gx-xl-6 align-items-start">

      <!-- شعار + وصف -->
      <div class="col-12 col-md-6 col-lg-4" data-aos="fade-up" data-aos-delay="100">
        <div class="footer-brand">
          <img src="assets/img/Logo footer.svg" alt="EKD Logo" class="footer-logo mb-2">
          <p class="footer-desc mb-0">
            {{ description }}
          </p>
        </div>
      </div>

      <!-- Quick Links -->
      <div class="col-6 col-md-3 col-lg-2" data-aos="fade-up" data-aos-delay="200">
        <h6 class="footer-title">Quick Links</h6>
        <ul class="list-unstyled mb-0">
          <li><a href="javascript:void(0)" class="footer-link" (click)="scrollTo('about')">About Us</a></li>
          <li><a href="javascript:void(0)" class="footer-link" (click)="scrollTo('how-it-works')">How It Works</a></li>
          <li><a href="javascript:void(0)" class="footer-link" (click)="scrollTo('features')">Features</a></li>
          <li><a href="javascript:void(0)" class="footer-link" (click)="scrollTo('contact')">Contact</a></li>
        </ul>
      </div>

      <!-- Legal -->
      <div class="col-6 col-md-3 col-lg-3" data-aos="fade-up" data-aos-delay="300">
        <h6 class="footer-title">Legal</h6>
        <ul class="list-unstyled mb-0">
          <li><a href="#" class="footer-link">Privacy Policy</a></li>
          <li><a href="#" class="footer-link">Terms &amp; Conditions</a></li>
          <li><a href="#" class="footer-link">Cookie Policy</a></li>
        </ul>
      </div>

      <!-- Follow Us -->
      <div class="col-12 col-md-12 col-lg-3" data-aos="fade-up" data-aos-delay="400">
        <h6 class="footer-title">Follow Us</h6>
        <ul class="socials list-unstyled d-flex align-items-center gap-2 mb-0">
          <li *ngIf="isValidLink(facebook)"><a [href]="facebook" class="social-link" target="_blank" rel="noopener" aria-label="Facebook"><i class="fab fa-facebook-f"></i></a></li>
          <li *ngIf="isValidLink(twitter)"><a [href]="twitter" class="social-link" target="_blank" rel="noopener" aria-label="Twitter"><i class="fab fa-twitter"></i></a></li>
          <li *ngIf="isValidLink(linkedin)"><a [href]="linkedin" class="social-link" target="_blank" rel="noopener" aria-label="LinkedIn"><i class="fab fa-linkedin-in"></i></a></li>
          <li *ngIf="isValidLink(instagram)"><a [href]="instagram" class="social-link" target="_blank" rel="noopener" aria-label="Instagram"><i class="fab fa-instagram"></i></a></li>
        </ul>
      </div>

    </div>

    <hr class="footer-divider" data-aos="fade-left" data-aos-delay="500">

    <!-- أسفل الفوتر -->
    <div class="footer-bottom text-center py-3" data-aos="fade-right" data-aos-delay="600">
      © 2025 EDKD. All rights reserved.
    </div>
  </div>
</footer>
