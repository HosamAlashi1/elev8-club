<div class="container py-5">
  <div class="text-center mb-5" data-aos="fade-up" data-aos-duration="800">
    <h3 class="section-title st-divider mb-0" data-aos="fade-up" data-aos-duration="800" data-aos-once="true"
      data-aos-anchor-placement="top-bottom">{{ sectionTitle }} <span class="dot"></span></h3>
  </div>

  <div class="row justify-content-center py-4 g-4 g-lg-5">
    <div class="col-6 col-md-3" *ngFor="let step of steps; index as i; trackBy: trackById" data-aos="fade-up"
      [attr.data-aos-delay]="aosDelay(i)" data-aos-duration="800">
      <div class="process-step text-center mx-auto">
        <div class="process-badge mx-auto mb-3">{{ step.id }}</div>
        <h6 class="process-title fw-semibold mb-3">{{ step.title }}</h6>
        <p class="process-desc text-muted small mb-0">{{ step.description }}</p>
      </div>
    </div>
  </div>
</div>
