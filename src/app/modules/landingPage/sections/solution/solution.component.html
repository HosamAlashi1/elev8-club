<div class="container py-5">

  <!-- عنوان السكشن -->
  <div class="text-center mb-5" data-aos="fade-up" data-aos-duration="800">
    <h3 class="section-title st-divider mb-0" data-aos="fade-up" data-aos-duration="800">{{ title }} <span class="dot"></span></h3>
  </div>

  <div class="row align-items-center mt-2 pb-4 g-0"> <!-- أزلت الـ gutter -->
    
    <!-- الصورة -->
    <div class="col-lg-6 mb-4 mb-lg-0" data-aos="fade-right" data-aos-duration="800">
      <img [src]="image" alt="Testing" class="img-fluid rounded-3 shadow-sm w-100">
    </div>

    <!-- النصوص -->
    <div class="col-lg-6 ps-lg-5" data-aos="fade-left" data-aos-duration="800" data-aos-delay="200">
      <p class="text-muted mb-4 solution-text">
        {{ description }}
      </p>

      <!-- القائمة -->
      <ul class="list-unstyled">
        <li *ngFor="let feature of features" class="d-flex align-items-center mb-3">
          <span class="check-icon me-2">
            <i class="fas fa-check"></i>
          </span>
          <span>{{ feature }}</span>
        </li>
      </ul>
    </div>

  </div>
</div>
