<div class="container py-5">

  <!-- العنوان -->
  <div class="text-center pt-2 mb-4" data-aos="fade-up" data-aos-duration="800">
    <h3 class="section-title st-divider mb-0" data-aos="fade-up" data-aos-duration="800">{{ title }} <span class="dot"></span></h3>
  </div>

  <div class="row row-contacts align-items-start g-4 gx-lg-5 gx-xl-6 pb-4">
    <!-- الفورم -->
    <div class="col-lg-6" data-aos="fade-right" data-aos-duration="800">
      <form #contactForm="ngForm" (ngSubmit)="submit(contactForm)" novalidate>

        <div class="mb-3">
          <label class="form-label small text-muted mb-1">Name</label>
          <input 
            type="text" 
            class="form-control contact-input" 
            [class.is-invalid]="nameField.invalid && formSubmitted"
            name="name" 
            #nameField="ngModel"
            [(ngModel)]="formModel.name" 
            required 
            minlength="2"
            maxlength="50" />
          <div class="invalid-feedback" *ngIf="nameField.invalid && formSubmitted">
            <small *ngIf="nameField.errors?.['required']">الاسم مطلوب</small>
            <small *ngIf="nameField.errors?.['minlength']">الاسم يجب أن يكون أكثر من حرف واحد</small>
            <small *ngIf="nameField.errors?.['maxlength']">الاسم طويل جداً</small>
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label small text-muted mb-1">Email</label>
          <input 
            type="email" 
            class="form-control contact-input" 
            [class.is-invalid]="emailField.invalid && formSubmitted"
            name="email" 
            #emailField="ngModel"
            [(ngModel)]="formModel.email" 
            required 
            email 
            maxlength="100" />
          <div class="invalid-feedback" *ngIf="emailField.invalid && formSubmitted">
            <small *ngIf="emailField.errors?.['required']">البريد الإلكتروني مطلوب</small>
            <small *ngIf="emailField.errors?.['email']">صيغة البريد الإلكتروني غير صحيحة</small>
            <small *ngIf="emailField.errors?.['maxlength']">البريد الإلكتروني طويل جداً</small>
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label small text-muted mb-1">Message</label>
          <textarea 
            rows="5" 
            class="form-control contact-input" 
            [class.is-invalid]="messageField.invalid && formSubmitted"
            name="message" 
            #messageField="ngModel"
            [(ngModel)]="formModel.message" 
            required
            minlength="10"
            maxlength="500"></textarea>
          <div class="invalid-feedback" *ngIf="messageField.invalid && formSubmitted">
            <small *ngIf="messageField.errors?.['required']">الرسالة مطلوبة</small>
            <small *ngIf="messageField.errors?.['minlength']">الرسالة قصيرة جداً (الحد الأدنى 10 أحرف)</small>
            <small *ngIf="messageField.errors?.['maxlength']">الرسالة طويلة جداً (الحد الأقصى 500 حرف)</small>
          </div>
        </div>

        <button 
          type="submit" 
          class="btn btn-primary w-100 btn-send mt-2"
          [disabled]="sending || contactForm.invalid">
          <span *ngIf="sending" class="spinner-border spinner-border-sm me-2" role="status"></span>
          {{ sending ? 'جاري الإرسال...' : 'إرسال الرسالة' }}
        </button>
      </form>
    </div>

    <!-- معلومات التواصل + الخريطة -->
    <div class="col-lg-6" data-aos="fade-left" data-aos-duration="800" data-aos-delay="120">

      <div class="contact-info mb-3">
        <div class="info-item d-flex align-items-start mb-3" *ngFor="let i of info">
          <div class="info-icon me-1">
            <i [class]="i.icon" class="fs-4" aria-hidden="true"></i>
          </div>
          <div>
            <div class="fw-semibold small mb-1">{{ i.label }}</div>
            <div class="text-muted small">
              <a *ngIf="i.href; else plain" [href]="i.href" class="link-muted">{{ i.value }}</a>
              <ng-template #plain>{{ i.value }}</ng-template>
            </div>
          </div>
        </div>
      </div>

      <!-- خريطة الشرق الأوسط بدون عنوان/ماركر -->
      <div class="map-card">
        <iframe class="map-iframe" [src]="safeMapUrl" loading="lazy"></iframe>
      </div>
    </div>
  </div>
</div>
