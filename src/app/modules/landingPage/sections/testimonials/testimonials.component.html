<div class="container py-5">

  <!-- عنوان السكشن -->
  <div class="text-center pt-2 mb-4" data-aos="fade-up" data-aos-duration="800">
    <h3 class="section-title st-divider mb-0" data-aos="fade-up" data-aos-duration="800">{{ title }} <span class="dot"></span></h3>
  </div>

  <div class="row pb-4 g-4 g-lg-4">
    <div
      class="col-12 col-md-6 col-lg-4"
      *ngFor="let t of testimonials; index as i"
      data-aos="fade-up"
      [attr.data-aos-delay]="i * 100"
      data-aos-duration="800"
    >
      <div class="testimonial-card p-4 bg-white">
        <!-- رأس الكرت: أفاتار + اسم/وظيفة -->
        <div class="d-flex align-items-center mb-3">
          <img [src]="t.avatar" [alt]="t.name" class="avatar me-3">
          <div>
            <div class="fw-semibold name">{{ t.name }}</div>
            <div class="text-muted small role">{{ t.role }}</div>
          </div>
        </div>

        <!-- الاقتباس -->
        <p class="quote text-muted fs-6 mb-3">“{{ t.quote }}”</p>

        <!-- التقييم -->
        <div class="stars">
          <i *ngFor="let s of stars"
             class="fas"
             [class.fa-star]="s <= t.rating"
             [class.fa-star-half-alt]="false"
             [class.fa-star-o]="s > t.rating"></i>
        </div>
      </div>
    </div>
  </div>
</div>
