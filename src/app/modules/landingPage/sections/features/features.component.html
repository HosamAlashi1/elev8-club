<div class="container py-5">

  <!-- عنوان السكشن -->
  <div class="text-center mb-4" data-aos="fade-up" data-aos-duration="800">
    <h3 class="section-title st-divider mb-0" data-aos="fade-up" data-aos-duration="800">{{ title }} <span class="dot"></span></h3>
  </div>

  <!-- شبكة المزايا -->
  <div class="row g-4 g-lg-4">
    <div
      class="col-12 col-md-6 col-lg-4"
      *ngFor="let feature of features; index as i; trackBy: trackById"
      data-aos="fade-up"
      [attr.data-aos-delay]="aosDelay(i)"
      data-aos-duration="800"
    >
      <div class="feature-card h-100 bg-white p-4">
        <div class="feature-icon mb-4">
          <!-- Use icon class if it's a FontAwesome icon, otherwise use image -->
          <i *ngIf="isIcon(feature.image)" [class]="getIconClass(feature.image)" aria-hidden="true"></i>
          <img *ngIf="!isIcon(feature.image)" [src]="feature.image" [alt]="feature.title" class="feature-img">
        </div>
        <h4 class="feature-title fw-semibold mb-2">{{ feature.title }}</h4>
        <p class="feature-desc text-muted fs-6 mb-0">{{ feature.description }}</p>
      </div>
    </div>
  </div>
</div>
